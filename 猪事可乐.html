<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猪事可乐 - 猪厂风云</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:"Microsoft YaHei","PingFang SC",sans-serif;user-select:none}
:root{
  --bg-dark:#0a0a12;--bg-mid:#15151f;--bg-light:#202030;
  --gold:#c5a059;--gold-l:#e8c878;--gold-d:#8a7030;
  --pink:#d47070;--pink-l:#e8a0a0;
  --cream:#f0e6d2;--text:#e0d8c8;--dim:#7a7a8a;
  --lazzhu:#5a8ab4;--haozhu:#d44848;--yuzhu:#5aaa5a;
  --touzh:#8a6aba;--weizh:#d4a0d4;
}
#game{position:relative;width:100vw;height:100vh;max-width:1600px;margin:0 auto;background:var(--bg-dark);overflow:hidden;cursor:pointer}
#bg-layer{position:absolute;inset:0;z-index:1;transition:opacity .8s ease}
.bg-scene{position:absolute;inset:0;opacity:0;transition:opacity 1s ease}
.bg-scene.active{opacity:1}
.bg-office{background:linear-gradient(180deg,#0a0a1a 0%,#131328 50%,#1a1a35 100%)}
.bg-office::before{content:'';position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(180deg,transparent,rgba(0,0,0,.6))}
.bg-meeting{background:linear-gradient(180deg,#15151a 0%,#1a1a22 50%,#101018 100%)}
.bg-cafeteria{background:radial-gradient(ellipse at center 60%,#2a2030 0%,#15101a 50%,#0a0a10 100%)}
.bg-rooftop{background:linear-gradient(180deg,#1a1a14 0%,#181410 50%,#100c08 100%)}
.bg-night{background:linear-gradient(180deg,#050510 0%,#0a0a1a 50%,#0d0d18 100%)}
.bg-ending{background:radial-gradient(ellipse at center,#1a1525 0%,#0a0a10 70%)}
#bg-layer::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.5) 100%);pointer-events:none;z-index:5}
#char-layer{position:absolute;inset:0;z-index:3;pointer-events:none}
.char-sprite{position:absolute;bottom:120px;transition:all .5s ease;opacity:0;transform:translateY(20px);filter:brightness(.5)}
.char-sprite.active{opacity:1;transform:translateY(0);filter:brightness(1)}
.char-sprite.left{left:3%}
.char-sprite.center{left:50%;transform:translateX(-50%) translateY(20px)}
.char-sprite.center.active{transform:translateX(-50%) translateY(0)}
.char-sprite.right{right:3%}
.char-sprite svg{width:300px;height:auto;filter:drop-shadow(0 4px 20px rgba(0,0,0,.6))}
#dialogue-box{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:20px 40px 24px;background:linear-gradient(180deg,rgba(10,10,18,.85) 0%,rgba(15,15,25,.95) 100%);border-top:2px solid var(--gold-d);min-height:180px;transform:translateY(100%);transition:transform .3s ease;cursor:default}
#dialogue-box.show{transform:translateY(0)}
#dialogue-box::before{content:'';position:absolute;top:-2px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--pink),transparent)}
#speaker-name{display:inline-block;padding:4px 20px;margin-bottom:10px;background:linear-gradient(135deg,var(--bg-mid),var(--bg-light));border:1px solid var(--gold-d);border-radius:4px;color:var(--gold-l);font-size:16px;font-weight:bold;letter-spacing:2px}
#speaker-name.narration{border-color:var(--dim);color:var(--dim)}
#speaker-name.lazzhu{border-color:var(--lazzhu);color:#8ab4d8}
#speaker-name.haozhu{border-color:var(--haozhu);color:#e88888}
#speaker-name.yuzhu{border-color:var(--yuzhu);color:#88d888}
#speaker-name.touzh{border-color:var(--touzh);color:#b888e8}
#speaker-name.weizh{border-color:var(--weizh);color:#e8b0e8}
#dialogue-text{color:var(--text);font-size:17px;line-height:1.9;letter-spacing:.5px;min-height:60px;text-shadow:0 1px 2px rgba(0,0,0,.8)}
.cursor-blink{animation:blink .6s step-end infinite;color:var(--pink-l)}
@keyframes blink{50%{opacity:0}}
#choices-layer{position:absolute;inset:0;z-index:15;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(5,5,10,.7);opacity:0;pointer-events:none;transition:opacity .3s}
#choices-layer.show{opacity:1;pointer-events:auto}
.choice-btn{min-width:420px;max-width:600px;padding:14px 28px;background:linear-gradient(135deg,rgba(20,20,30,.95),rgba(30,30,45,.95));border:1px solid var(--pink);border-radius:6px;color:var(--cream);font-size:15px;cursor:pointer;transition:all .25s ease;letter-spacing:1px;text-align:center;position:relative;overflow:hidden}
.choice-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--pink);transform:scaleY(0);transition:transform .25s}
.choice-btn:hover{background:linear-gradient(135deg,rgba(40,25,25,.95),rgba(50,30,30,.95));border-color:var(--pink-l);box-shadow:0 0 20px rgba(212,112,112,.25);transform:translateX(8px)}
.choice-btn:hover::before{transform:scaleY(1)}
#title-screen{position:absolute;inset:0;z-index:50;background:radial-gradient(ellipse at center,#1a1525 0%,#050510 80%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;transition:opacity .6s ease}
#title-screen.hidden{opacity:0;pointer-events:none}
.title-deco{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;background:radial-gradient(circle at 30% 40%,rgba(212,112,112,.06) 0%,transparent 40%),radial-gradient(circle at 70% 60%,rgba(197,160,89,.06) 0%,transparent 40%)}
#title-main{font-size:48px;font-weight:bold;color:var(--pink-l);letter-spacing:6px;text-shadow:0 0 30px rgba(212,112,112,.4),0 2px 4px #000;text-align:center;line-height:1.3}
#title-main small{display:block;font-size:16px;color:var(--dim);letter-spacing:4px;margin-top:8px;font-weight:normal}
#title-sub{font-size:18px;color:var(--dim);letter-spacing:6px;border-top:1px solid var(--gold-d);border-bottom:1px solid var(--gold-d);padding:8px 40px}
.title-btns{display:flex;flex-direction:column;gap:14px;margin-top:10px}
.title-btn{min-width:240px;padding:12px 40px;background:transparent;border:1px solid var(--gold-d);color:var(--cream);font-size:16px;cursor:pointer;transition:all .25s;letter-spacing:4px;text-align:center}
.title-btn:hover{background:rgba(212,112,112,.1);border-color:var(--pink-l);color:var(--pink-l);box-shadow:0 0 15px rgba(212,112,112,.2)}
.title-btn.primary{background:linear-gradient(135deg,rgba(212,112,112,.15),rgba(197,160,89,.1));border-color:var(--pink)}
#name-input-screen{position:absolute;inset:0;z-index:48;background:rgba(5,5,10,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .4s}
#name-input-screen.hidden{opacity:0;pointer-events:none}
#name-input-screen h2{color:var(--pink-l);font-size:22px;letter-spacing:4px}
#name-input-screen p{color:var(--dim);font-size:14px}
#player-name-input{padding:12px 20px;font-size:18px;background:var(--bg-mid);border:1px solid var(--gold-d);border-radius:4px;color:var(--cream);text-align:center;letter-spacing:2px;outline:none;width:240px}
#player-name-input:focus{border-color:var(--pink-l);box-shadow:0 0 10px rgba(212,112,112,.2)}
#hud{position:absolute;top:16px;right:20px;z-index:12;display:flex;flex-direction:column;gap:6px;opacity:0;transition:opacity .3s}
#hud.show{opacity:1}
.hud-item{display:flex;align-items:center;gap:6px;background:rgba(10,10,18,.7);padding:3px 10px;border-radius:4px;border:1px solid var(--bg-light);font-size:11px}
.hud-label{min-width:28px;letter-spacing:1px}
.hud-bar{width:70px;height:5px;background:var(--bg-light);border-radius:3px;overflow:hidden}
.hud-fill{height:100%;border-radius:3px;transition:width .5s ease}
.hud-fill.lazzhu{background:linear-gradient(90deg,#3a5a7a,var(--lazzhu))}
.hud-fill.haozhu{background:linear-gradient(90deg,#8a3a3a,var(--haozhu))}
.hud-fill.yuzhu{background:linear-gradient(90deg,#3a7a3a,var(--yuzhu))}
.hud-fill.touzh{background:linear-gradient(90deg,#5a3a7a,var(--touzh))}
.hud-fill.weizh{background:linear-gradient(90deg,#7a3a7a,var(--weizh))}
#affinity-popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;font-size:22px;font-weight:bold;opacity:0;transition:all .6s ease;pointer-events:none}
#affinity-popup.show{opacity:1;transform:translate(-50%,-60%)}
#top-bar{position:absolute;top:0;left:0;z-index:13;display:flex;gap:8px;padding:12px}
.top-btn{width:32px;height:32px;background:rgba(10,10,18,.6);border:1px solid var(--bg-light);border-radius:4px;color:var(--dim);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.top-btn:hover{color:var(--pink-l);border-color:var(--pink)}
#ending-screen{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;opacity:0;pointer-events:none;transition:opacity 1s ease}
#ending-screen.show{opacity:1;pointer-events:auto}
#ending-type{font-size:16px;color:var(--pink-l);letter-spacing:6px}
#ending-title{font-size:32px;font-weight:bold;color:var(--cream);letter-spacing:4px;text-shadow:0 0 20px rgba(212,112,112,.3);text-align:center;max-width:700px;line-height:1.5}
#ending-text{font-size:14px;color:var(--dim);max-width:600px;text-align:center;line-height:2;letter-spacing:1px}
.ending-btns{display:flex;gap:16px;margin-top:20px}
#fade-overlay{position:absolute;inset:0;z-index:35;background:#000;opacity:0;pointer-events:none;transition:opacity .6s ease}
#fade-overlay.show{opacity:1}
#scene-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:30;color:var(--pink-l);font-size:20px;letter-spacing:8px;opacity:0;transition:opacity .5s;pointer-events:none;text-align:center}
#scene-label.show{opacity:1}
#scene-label small{display:block;font-size:13px;color:var(--dim);letter-spacing:3px;margin-top:8px}
@media(max-width:768px){
  .char-sprite svg{width:200px}
  .char-sprite{bottom:150px}
  #dialogue-box{padding:16px 20px 20px;min-height:150px}
  #dialogue-text{font-size:15px}
  #title-main{font-size:32px}
  .choice-btn{min-width:300px;font-size:14px;padding:12px 20px}
  #ending-title{font-size:24px}
}
.click-advance{position:absolute;bottom:8px;right:16px;font-size:12px;color:var(--dim);animation:pulse 1.5s ease-in-out infinite;z-index:11}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}
</style>
</head>
<body>
<div id="game">
  <div id="bg-layer"></div>
  <div id="char-layer">
    <div id="char-left" class="char-sprite left"></div>
    <div id="char-center" class="char-sprite center"></div>
    <div id="char-right" class="char-sprite right"></div>
  </div>
  <div id="hud">
    <div class="hud-item"><span style="font-size:12px">🐷</span><span class="hud-label" style="color:#8ab4d8">拉猪</span><div class="hud-bar"><div class="hud-fill lazzhu" id="bar-lazzhu" style="width:0%"></div></div></div>
    <div class="hud-item"><span style="font-size:12px">🦔</span><span class="hud-label" style="color:#e88888">豪猪</span><div class="hud-bar"><div class="hud-fill haozhu" id="bar-haozhu" style="width:0%"></div></div></div>
    <div class="hud-item"><span style="font-size:12px">💎</span><span class="hud-label" style="color:#88d888">玉猪</span><div class="hud-bar"><div class="hud-fill yuzhu" id="bar-yuzhu" style="width:0%"></div></div></div>
    <div class="hud-item"><span style="font-size:12px">🍚</span><span class="hud-label" style="color:#b888e8">头猪</span><div class="hud-bar"><div class="hud-fill touzh" id="bar-touzh" style="width:0%"></div></div></div>
    <div class="hud-item"><span style="font-size:12px">👑</span><span class="hud-label" style="color:#e8b0e8">尾猪</span><div class="hud-bar"><div class="hud-fill weizh" id="bar-weizh" style="width:0%"></div></div></div>
  </div>
  <div id="top-bar">
    <button class="top-btn" id="btn-save" title="存档">💾</button>
    <button class="top-btn" id="btn-auto" title="自动">⚡</button>
    <button class="top-btn" id="btn-skip" title="快进">⏩</button>
    <button class="top-btn" id="btn-menu" title="菜单">☰</button>
  </div>
  <div id="affinity-popup"></div>
  <div id="scene-label"></div>
  <div id="dialogue-box">
    <span id="speaker-name"></span>
    <div id="dialogue-text"></div>
    <div class="click-advance" id="click-hint">▼ 点击继续</div>
  </div>
  <div id="choices-layer"></div>
  <div id="fade-overlay"></div>
  <div id="ending-screen">
    <div id="ending-type"></div>
    <div id="ending-title"></div>
    <div id="ending-text"></div>
    <div class="ending-btns">
      <button class="title-btn" id="btn-restart">回到标题</button>
    </div>
  </div>
  <div id="title-screen">
    <div class="title-deco"></div>
    <div id="title-main">猪事可乐<small>猪厂新人职场生存指南</small></div>
    <div id="title-sub">办 公 室 风 云</div>
    <div class="title-btns">
      <button class="title-btn primary" id="btn-start">开始游戏</button>
      <button class="title-btn" id="btn-continue" style="display:none">继续游戏</button>
      <button class="title-btn" id="btn-about">关于</button>
    </div>
    <div id="title-tag" style="margin-top:16px;font-size:13px;color:var(--dim);letter-spacing:3px;opacity:.6">点击屏幕推进剧情 · 选择决定命运</div>
  </div>
  <div id="name-input-screen" class="hidden">
    <h2>请输入你的名字</h2>
    <p>你是猪厂新来的员工</p>
    <input type="text" id="player-name-input" maxlength="6" placeholder="新人" value="新人">
    <button class="title-btn primary" id="btn-confirm-name">确认</button>
  </div>
</div>
<script>
/* ===== PIG PORTRAITS ===== */
function pigSVG(bodyColor, earColor, snoutColor, hair, accessories, expr) {
  const eyeMouth = expr==='happy' ? `
    <path d="M108,198 Q120,190 132,198" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M188,198 Q200,190 212,198" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M148,238 Q160,250 172,238" stroke="#c44848" stroke-width="2" fill="none" stroke-linecap="round"/>
    <ellipse cx="125" cy="212" rx="12" ry="6" fill="#f0a080" opacity=".25"/>
    <ellipse cx="195" cy="212" rx="12" ry="6" fill="#f0a080" opacity=".25"/>
  ` : expr==='angry' ? `
    <path d="M105,192 L135,198" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M185,198 L215,192" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="120" cy="200" rx="9" ry="7" fill="#fff"/>
    <ellipse cx="200" cy="200" rx="9" ry="7" fill="#fff"/>
    <circle cx="122" cy="202" r="5" fill="#4a3a2a"/>
    <circle cx="198" cy="202" r="5" fill="#4a3a2a"/>
    <path d="M150,240 Q160,234 170,240" stroke="#a02828" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  ` : expr==='serious' ? `
    <path d="M108,194 L135,198" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M185,198 L212,194" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="122" cy="201" rx="8" ry="7" fill="#fff"/>
    <ellipse cx="198" cy="201" rx="8" ry="7" fill="#fff"/>
    <circle cx="123" cy="202" r="5" fill="#4a3a2a"/>
    <circle cx="197" cy="202" r="5" fill="#4a3a2a"/>
    <path d="M152,242 L168,242" stroke="#a05050" stroke-width="2" fill="none" stroke-linecap="round"/>
  ` : `
    <ellipse cx="122" cy="200" rx="8" ry="7" fill="#fff"/>
    <ellipse cx="198" cy="200" rx="8" ry="7" fill="#fff"/>
    <circle cx="123" cy="202" r="5" fill="#4a3a2a"/>
    <circle cx="197" cy="202" r="5" fill="#4a3a2a"/>
    <circle cx="125" cy="199" r="2" fill="#fff"/>
    <circle cx="199" cy="199" r="2" fill="#fff"/>
    <path d="M150,240 Q160,244 170,240" stroke="#a05050" stroke-width="2" fill="none" stroke-linecap="round"/>
  `;
  return `<svg viewBox="0 0 320 480" xmlns="http://www.w3.org/2000/svg">
<defs>
<linearGradient id="ps" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="${bodyColor[0]}"/><stop offset="1" stop-color="${bodyColor[1]}"/></linearGradient>
</defs>
<!-- Body -->
<path d="M60,480 L60,360 Q60,310 110,295 Q145,285 160,283 Q175,285 210,295 Q260,310 260,360 L260,480 Z" fill="url(#ps)"/>
<!-- Neck -->
<path d="M140,260 L140,290 Q160,296 180,290 L180,260 Z" fill="url(#ps)"/>
<!-- Head -->
<ellipse cx="160" cy="200" rx="80" ry="70" fill="url(#ps)"/>
<!-- Pig ears -->
<ellipse cx="90" cy="160" rx="22" ry="16" fill="${earColor}" transform="rotate(-20,90,160)"/>
<ellipse cx="75" cy="160" rx="14" ry="10" fill="#e8b0b0" transform="rotate(-20,75,160)" opacity=".4"/>
<ellipse cx="230" cy="160" rx="22" ry="16" fill="${earColor}" transform="rotate(20,230,160)"/>
<ellipse cx="245" cy="160" rx="14" ry="10" fill="#e8b0b0" transform="rotate(20,245,160)" opacity=".4"/>
<!-- Snout -->
<ellipse cx="160" cy="228" rx="22" ry="16" fill="${snoutColor}" opacity=".4"/>
<ellipse cx="155" cy="226" rx="4" ry="5" fill="#5a3a2a" opacity=".4"/>
<ellipse cx="165" cy="226" rx="4" ry="5" fill="#5a3a2a" opacity=".4"/>
<!-- Hair -->
${hair}
<!-- Eyes/Mouth -->
${eyeMouth}
<!-- Accessories -->
${accessories}
</svg>`;
}

function portraitLazzhu(expr){
  return pigSVG(
    ['#e8c8b0','#d4b098'],
    '#c5a059',
    '#d4a080',
    `<path d="M92,145 Q100,100 160,88 Q220,100 228,145 L225,135 Q215,110 188,106 Q180,130 168,118 Q160,135 148,118 Q140,135 128,118 Q108,120 100,135 Z" fill="#3a3a4e"/>
     <path d="M96,140 Q105,115 120,112" stroke="#4a4a5e" stroke-width="2" fill="none" opacity=".6"/>
     <path d="M224,140 Q215,115 200,112" stroke="#4a4a5e" stroke-width="2" fill="none" opacity=".6"/>`,
    `<g>
      <rect x="108" y="185" width="34" height="24" rx="4" fill="rgba(200,220,255,.06)" stroke="#3a3a4e" stroke-width="1.5"/>
      <rect x="178" y="185" width="34" height="24" rx="4" fill="rgba(200,220,255,.06)" stroke="#3a3a4e" stroke-width="1.5"/>
      <line x1="142" y1="195" x2="178" y2="195" stroke="#3a3a4e" stroke-width="1.5"/>
      <path d="M108,190 L90,186" stroke="#3a3a4e" stroke-width="1.5" fill="none"/>
      <path d="M212,190 L230,186" stroke="#3a3a4e" stroke-width="1.5" fill="none"/>
      <line x1="114" y1="188" x2="118" y2="202" stroke="#fff" stroke-width="1" opacity=".2"/>
      <line x1="184" y1="188" x2="188" y2="202" stroke="#fff" stroke-width="1" opacity=".2"/>
     </g>
     <!-- Tie -->
     <path d="M155,283 L160,330 L165,283 Z" fill="#3a5a7a"/>
     <path d="M153,283 L160,290 L167,283 Z" fill="#4a6a8a"/>`,
    expr
  );
}

function portraitHaozhu(expr){
  return pigSVG(
    ['#e8c8b0','#d4b098'],
    '#c44848',
    '#d4a080',
    `<path d="M86,148 Q90,95 160,82 Q230,95 234,148 L230,130 Q220,105 190,100 Q182,128 170,115 Q160,132 148,115 Q138,132 126,115 Q105,118 95,132 Z" fill="#3a2a2a"/>
     <!-- Spiky hair -->
     <path d="M90,130 L80,100 L100,120 L95,85 L115,115 L120,75 L140,110 L148,68 L160,105 L172,68 L180,110 L200,75 L205,115 L225,85 L220,120 L240,100 L230,130" fill="#2a1a1a"/>
     <!-- Leather jacket collar -->
     <path d="M110,295 Q135,285 160,283 Q185,285 210,295 L200,320 L160,310 L120,320 Z" fill="#2a2a2a"/>`,
    `<circle cx="92" cy="148" r="3" fill="#c5a059"/>
     <circle cx="97" cy="142" r="2" fill="#c5a059"/>`,
    expr==='angry' ? expr : expr
  );
}

function portraitYuzhu(expr){
  return pigSVG(
    ['#e8d0c0','#d4b8a8'],
    '#5aaa5a',
    '#d4a880',
    `<path d="M94,148 Q98,105 160,92 Q222,105 226,148 L223,138 Q215,115 190,110 Q182,133 170,122 Q160,138 148,122 Q138,133 126,110 Q108,118 100,135 Z" fill="#2a3a2a"/>
     <path d="M98,140 Q105,118 118,115" stroke="#3a4a3a" stroke-width="2" fill="none" opacity=".5"/>

  text:'"不过说真的——"\n他突然收起嬉皮笑脸，难得正经了一秒。\n"这公司虽然乱，但人都不坏。\n"尤其是拉猪……他虽然老管着我，但其实是个好人。"'},
z6:{char:'haozhu',expr:'normal',speaker:'haozhu',
  text:'"我跟你讲这些干啥……走走走，带你去楼下便利店！"\n他拉着你的胳膊往外冲。\n"我请你吃烤肠！咱们边吃边聊！"'},
z6_choice:{choices:[
  {text:'高兴地跟他一起去，边走边聊',next:'z7',affinity:{haozhu:2}},
  {text:'"等等，我先回个消息……"',next:'z7b',affinity:{haozhu:1}},
  {text:'"我不太吃路边摊……"',next:'z7c',affinity:{haozhu:-1}}
]},
z7:{char:'haozhu',expr:'happy',speaker:'haozhu',next:'z8',
  text:'"爽快！我就喜欢你这样的人！"\n他重重拍了拍你的背，差点把你拍出内伤。\n"你比那些扭扭捏捏的新人强多了！"'},
z7b:{char:'haozhu',expr:'normal',speaker:'haozhu',next:'z8',
  text:'"行行行，你回你回。"\n他站在一边等你，用脚打着拍子。\n"好了没？走走走！烤肠要凉了！"\n——烤肠需要凉吗？'},
z7c:{char:'haozhu',expr:'normal',speaker:'haozhu',next:'z8',
  text:'"呃……好吧。那我给你带一杯奶茶上来。"\n他看起来有点失落，但很快就恢复了活力。\n"你喝什么？三分糖？全糖？——我建议全糖，人生已经够苦了！"'},
z8:{speaker:'narration',
  text:'便利店的烤肠机前，豪猪一边给烤肠刷酱一边跟你聊天。\n你发现他虽然看起来咋咋呼呼的，但其实很会照顾人。\n"你吃辣吗？多放点辣椒好吃！"'},
z9:{char:'haozhu',expr:'normal',speaker:'haozhu',
  text:'"其实我来公司之前，也跟你想的一样——上班嘛，混日子。"\n他咬了一口烤肠，说话含糊不清。\n"但是待久了发现……这里的人挺好的。虽然个个都不正常。"\n"但正是不正常的人才有趣啊。"'},
z10:{char:'haozhu',expr:'happy',speaker:'haozhu',
  text:'"所以你也别紧张！放开点！"\n他把第二根烤肠塞到你手里。\n"在猪厂，最重要的不是工作能力——是你能不能接住大家的梗！"\n"我觉得你——可以的！"'},
z11:{speaker:'narration',
  text:'你们在便利店门口聊了很久。\n从公司八卦聊到人生理想，从游戏聊到美食。\n你发现豪猪其实是个很有趣的人——只要你忽略他偶尔的"嘉豪行为"。'},
z12:{bg:'night',text:'下班时间到了。豪猪收拾东西准备走人——他的包鼓得像要出门旅行。\n"你咋回去？我骑小电驴，要不要送你一程？"'},
z12_choice:{choices:[
  {text:'"好啊！正好体验一下你的车技！"',next:'z13',affinity:{haozhu:2}},
  {text:'"不用了，我坐地铁就行。"',next:'z13b',affinity:{haozhu:1}},
  {text:'"你的车……能载人吗？合法吗？"',next:'z13c',affinity:{haozhu:-1}}
]},
z13:{speaker:'narration',
  text:'豪猪的小电驴在晚高峰的车流中穿行。\n他一边骑车一边回头跟你说话（危险动作请勿模仿）。\n"下周公司有团建！你一定要来啊！"\n"玉猪说要搞什么——『团队协作能力提升工作坊』。"\n"听着就无聊——但我有办法让它变得有趣！"'},
z14:{char:'haozhu',expr:'happy',speaker:'haozhu',
  text:'"到了！"\n他一个帅气的甩尾停在路口。\n"明天见！记得来找我玩！"\n他冲你挥了挥手，然后骑着小电驴消失在车流中。\n后座还绑着一个晃晃悠悠的猪头气球。'},
z15:{speaker:'narration',
  text:'你站在原地，看着那个猪头气球越来越远。\n忍不住笑了出来。\n——猪厂的日子，好像真的挺有趣的。\n→ 前往结局判定'},
z13b:{speaker:'narration',
  text:'"好吧，那我先撤了！"\n豪猪跨上小电驴，一拧油门冲了出去。\n你看到他的猪头气球在风中飘扬。\n下次也许该坐他的车——你心想。\n→ 前往结局判定'},
z13c:{speaker:'narration',
  text:'"啧，你怎么跟拉猪一样啰嗦。"\n豪猪翻了个白眼，一溜烟跑了。\n你看到他的后尾灯消失在转角。\n也许你的话让他觉得你有点扫兴。\n→ 前往结局判定'},

/* ===== YUZHU ROUTE ===== */
y1:{bg:'office',label:'玉猪线',labelSub:'精打细算',
  text:'你走向玉猪的工位。\n他的桌上整整齐齐地摆着三台显示器，屏幕上全是Excel表格。\n边上一个精致的笔筒，里面插满了各种颜色的笔。'},
y2:{char:'yuzhu',expr:'normal',speaker:'yuzhu',
  text:'"找我有事？"\n他抬起头，推了推金丝眼镜。\n"如果是报销的话，填这张表——如果是团建建议的话，填那张表——"\n"如果是借钱的话——门在那边。"'},
y3:{char:'yuzhu',expr:'smile',speaker:'yuzhu',
  text:'"开玩笑的。"\n他笑了笑，拉开旁边的椅子。\n"坐吧。你是新人，我正好要跟你聊聊团建的事。"\n"毕竟——每个新人都有一票团建决定权。"'},
y4:{speaker:'narration',
  text:'玉猪的团建理念是：花最少的钱，办最快乐的事。\n他打开一个名为"团建方案库（2024-2025版）"的Excel文件。\n里面密密麻麻地列了三十多种方案，每一个都有详细的预算分析。'},
y5:{char:'yuzhu',expr:'normal',speaker:'yuzhu',
  text:'"你看——方案A：郊区露营，人均180，含烧烤和篝火晚会。"\n"方案B：密室逃脱+火锅，人均195，但需要凑满8人。"\n"方案C：公司会议室看团建电影——免费。"\n他推了推眼镜。\n"我个人推荐方案C。"'},
y5_choice:{choices:[
  {text:'"露营听起来不错啊！亲近自然！"',next:'y6',affinity:{yuzhu:1}},
  {text:'"密室逃脱吧！我擅长解谜！"',next:'y6b',affinity:{yuzhu:2}},
  {text:'"……会议室看电影也太惨了吧。"',next:'y6c',affinity:{yuzhu:-1}}
]},
y6:{char:'yuzhu',expr:'normal',speaker:'yuzhu',next:'y7',
  text:'"露营……也行。"\n他在Excel里做了一下计算。\n"不过租帐篷和睡袋的费用我得再压压价。你有认识的户外用品店吗？"'},
y6b:{char:'yuzhu',expr:'smile',speaker:'yuzhu',next:'y7',
  text:'"密室逃脱？好眼光。"\n他眼睛一亮，在方案B上打了个勾。\n"我刚好认识那家店的老板——能拿到员工价。"'},
y6c:{char:'yuzhu',expr:'normal',speaker:'yuzhu',next:'y7',
  text:'"确实惨，所以一般没人选。"\n他面不改色地关掉了方案C。\n"没关系，预算足够，我们可以考虑别的。"'},
y7:{char:'yuzhu',expr:'smile',speaker:'yuzhu',
  text:'"其实我管钱不是为了抠门。"\n他突然认真起来。\n"而是因为——我想让每一分钱都花得值得。"\n"团建也好，下午茶也好——让大家真正开心，才是目的。"'},
y8:{speaker:'narration',
  text:'你发现玉猪其实并不抠。\n他只是把每一笔账都算得清清楚楚，然后确保所有人都能享受到最好的体验。\n这种精细化管理的能力——确实值得学习。'},
y9:{char:'yuzhu',expr:'normal',speaker:'yuzhu',
  text:'"既然你加入了团建策划组——"他递给你一张表格。\n"来，帮我把下个季度的团建预算重算一遍。"\n"这也是新人培训的一部分。"\n你接过表格，发现上面全是密密麻麻的公式。'},
y10:{speaker:'narration',
  text:'你花了一整个下午和玉猪一起算预算。\n他教你用各种Excel技巧——vlookup、数据透视表、条件格式。\n你发现管钱这件事，比想象中有意思。'},
y11:{char:'yuzhu',expr:'smile',speaker:'yuzhu',
  text:'"不错，你算的跟我的结果只差五块钱。"\n他看着你的表格，满意地点了点头。\n"那五块钱的偏差——是给我的奶茶补贴。"\n你愣了一下，然后笑了。'},
y12:{bg:'night',text:'下班后，玉猪难得地合上了笔记本电脑。\n"今天辛苦了。我请你喝奶茶——用我的奶茶补贴。"\n他眨了眨眼睛。'},
y12_choice:{choices:[
  {text:'"好！我去买！你喝什么？"',next:'y13',affinity:{yuzhu:2}},
  {text:'"我请你吧，谢谢你教我这么多。"',next:'y13b',affinity:{yuzhu:1}},
  {text:'"不了，我不喝奶茶。"',next:'y13c',affinity:{yuzhu:-1}}
]},
y13:{speaker:'narraton',
  text:'奶茶店里，玉猪跟你聊了很多。\n"其实我以前也跟你一样——什么都不会，战战兢兢的。"\n"是拉猪带我入门的。"\n"后来我发现——我擅长的是管钱和管人。"\n"每个人都有自己的位置。"'},
y14:{char:'yuzhu',expr:'smile',speaker:'yuzhu',
  text:'"而你——我觉得你适合团建组。"\n他举起奶茶杯。\n"欢迎加入猪事可乐团建委员会——目前委员共两人。"\n"你和我。"\n你笑着和他碰了杯。'},
y15:{speaker:'narration',
  text:'走出奶茶店时，天已经黑了。\n玉猪在门口跟你道别，手里还拿着没算完的账本。\n"明天见。别忘了把方案B的预算细化一下。"\n你点了点头。\n——猪厂的财务之光，也许就是这样的温度。\n→ 前往结局判定'},
y13b:{speaker:'narration',
  text:'"那我不客气了。"\n他笑了笑，点了一杯最贵的。\n"开个玩笑——我要四季春茶，少糖去冰。"\n你们在奶茶店度过了愉快的半小时。\n→ 前往结局判定'},
y13c:{speaker:'narration',
  text:'"好吧，那我也不喝了。"\n他收起钱包。\n"省钱也好。"\n但你觉得他有点失望。\n→ 前往结局判定'},

/* ===== TOUZH ROUTE ===== */
t1:{bg:'office',label:'头猪线',labelSub:'碗中谜团',
  text:'你走向那个头顶兔饭碗的身影。\n头猪坐在工位上，碗端正地放在头中央，一动不动。\n偶尔发出一声低沉的叹息，像某种神秘的咒语。'},
t2:{char:'touzh',expr:'normal',speaker:'touzh',
  text:'"你……来……了……"\n他没有转头，但你知道他在跟你说话。\n"我……等……你……很……久……了……"\n他的声音像从很远的地方传来。'},
t3:{char:'touzh',expr:'normal',speaker:'touzh',
  text:'"你……想……知……道……碗……里……的……秘……密……吗……"\n他缓缓转过头来——\n碗上的"兔饭"两个字正好对着你。\n"我……也……不……知……道……"\n"但……尾……猪……说……要……每……天……端……着……"\n"所……以……我……就……端……着……"'},
t3_choice:{choices:[
  {text:'"你为什么要听尾猪的？"',next:'t4',affinity:{touzh:1}},
  {text:'"我能看看碗里是什么吗？"',next:'t4b',affinity:{touzh:2}},
  {text:'"……打扰了。"准备转身离开',next:'t4c',affinity:{touzh:-1}}
]},
t4:{char:'touzh',expr:'normal',speaker:'touzh',next:'t5',
  text:'"因……为……尾……猪……知……道……一……切……"\n他低声说。\n"他……说……只……要……我……端……着……碗……"\n"公……司……就……不……会……倒……闭……"\n"我……觉……得……他……说……得……对……"'},
t4b:{char:'touzh',expr:'normal',speaker:'touzh',next:'t5',
  text:'"你……确……定……？"\n他缓缓低头，试图把碗拿下来——但碗纹丝不动。\n"拿……不……下……来……了……"\n"已……经……长……在……头……上……了……"\n你一时不知道该不该相信他。'},
t4c:{speaker:'narration',next:'t5',
  text:'"别……走……"\n他忽然伸手抓住你的手腕。力道不大，但你被吓住了。\n"你……是……第……一……个……主……动……找……我……说……话……的……人……"\n"我……还……没……说……完……呢……"'},
t5:{speaker:'narration',
  text:'你决定暂时相信他——或者说，你被他的神秘感吸引了。\n他带你来到公司天台。\n视野开阔，微风习习——而他头上的兔饭碗在阳光下泛着诡异的光泽。'},
t6:{char:'touzh',expr:'normal',speaker:'touzh',
  text:'"你……知……道……为……什……么……公……司……叫……猪……事……可……乐……吗……"\n他望着远方。\n"因……为……有……一……头……猪……"\n"在……操……控……一……切……"\n"那……头……猪……就……是……尾……猪……"'},
t7:{char:'touzh',expr:'normal',speaker:'touzh',
  text:'"尾……猪……不……是……普……通……人……"\n"他……来……公……司……的……第……一……天……就……跟……我……说……"\n"『你——帮我端碗。公司就不会倒。』"\n"我……问……为……什……么……"\n"他……说……『因为我是尾猪』……"\n"这……个……理……由……我……无……法……反……驳……"'},
t8:{speaker:'narration',
  text:'你听得一头雾水，但隐约觉得——头猪说的可能是真的。\n这家公司的确有一种奇怪的氛围。\n每个人都有自己的角色，而这些角色……似乎都是尾猪安排的。'},
t9:{char:'touzh',expr:'normal',speaker:'touzh',
  text:'"你……觉……得……我……是……疯……子……吗……"\n他忽然转头看你。\n碗沿碰了碰你的额头。\n"没……关……系……\n"大……家……都……这……么……觉……得……"'},
t9_choice:{choices:[
  {text:'"不，我觉得你说的是真的。"',next:'t10',affinity:{touzh:2}},
  {text:'"我……我觉得还需要再观察一下。"',next:'t10b',affinity:{touzh:1}},
  {text:'"嗯……确实有一点。"',next:'t10c',affinity:{touzh:-1}}
]},
t10:{char:'touzh',expr:'normal',speaker:'touzh',next:'t11',
  text:'"你……是……第……一……个……相……信……我……的……人……"\n他的声音忽然不颤抖了——虽然还是很慢。\n"谢……谢……你……"\n"头……猪……很……感……动……"'},
t10b:{char:'touzh',expr:'normal',speaker:'touzh',next:'t11',
  text:'"没……关……系……"\n他点了点头。\n"这……本……来……就……很……难……让……人……相……信……"\n"连……我……自……己……都……不……太……信……"'},
t10c:{char:'touzh',expr:'normal',speaker:'touzh',next:'t11',
  text:'"嗯……你……说……得……对……"\n他低下头。\n"我……确……实……有……点……疯……"\n"但……那……个……碗……真……的……拿……不……下……来……了……"'},
t11:{speaker:'narration',
  text:'你们在天台上待了一整个下午。\n头猪说话很慢，但他讲的故事越来越有意思。\n他说尾猪其实是公司的创始人之一，但从不对外公开。\n"尾猪在幕后操控一切——包括拉猪的领带颜色。"'},
t12:{char:'touzh',expr:'normal',speaker:'touzh',
  text:'"我……告……诉……你……这……些……"\n"是……因……为……我……觉……得……你……可……以……成……为……自……己……人……"\n"我……们……猪……群……需……要……新……血……液……"'},
t13:{bg:'night',text:'夕阳西下，天台的影子拉得很长。\n头猪头上的碗在夕阳中泛出金色的光。\n"该……回……去……了……"\n"尾……猪……说……下……班……前……要……在……工……位……上……端……坐……三……分……钟……"'},
t13_choice:{choices:[
  {text:'"我陪你一起坐。"',next:'t14',affinity:{touzh:2}},
  {text:'"好，明天见。"',next:'t14b',affinity:{touzh:1}},
  {text:'飞快跑回工位，不想被人看到跟他在一起',next:'t14c',affinity:{touzh:-1}}
]},
t14:{speaker:'narration',
  text:'你和头猪并排坐在工位上，他头上顶着碗，你正襟危坐。\n三分钟里，你们一言不发。\n但你感受到了一种奇妙的默契。\n——仿佛你真的成为了什么神秘组织的一员。'},
t15:{speaker:'narration',
  text:'下班时，头猪在你经过时轻轻说了一句——\n"明……天……的……兔……饭……我……给……你……留……一……口……"\n你没来得及拒绝，他就飘走了。\n碗在灯光下闪闪发亮。\n——你似乎走进了一个比想象中更深的谜团。\n→ 前往结局判定'},
t14b:{speaker:'narration',
  text:'你回到工位收拾东西。\n路过时看到头猪真的端坐了整整三分钟，一动不动。\n你开始觉得——他说的那些话，可能真的都是真的。\n→ 前往结局判定'},
t14c:{speaker:'narration',
  text:'你快步离开的样子被豪猪看到了。\n"你刚跟头猪在一起？你疯啦？"\n你没有回答。\n但你知道——头猪一定注意到了你的疏远。\n→ 前往结局判定'},

/* ===== WEIZH ROUTE ===== */
w1:{bg:'office',label:'尾猪线',labelSub:'幕后之主',
  text:'你走向尾猪的办公室——说是办公室，更像一个时尚展厅。\n落地窗、白色沙发、墙上挂着艺术画。\n尾猪正翘着腿看手机，看到你来了，微微一笑。'},
w2:{char:'weizh',expr:'smug',speaker:'weizh',
  text:'"你终于来了。"\n他放下手机，做了个"请坐"的手势。\n"我算过——你会在入职第二天来找我。"\n"比平均晚了0.3天，但还在可接受范围内。"'},
w3:{char:'weizh',expr:'smug',speaker:'weizh',
  text:'"你一定有很多疑问——这家公司到底是什么？"\n"为什么门牌上画着猪？为什么头猪头上顶着碗？"\n"为什么豪猪每天都很暴躁？为什么玉猪总在算账？"\n"还有——拉猪为什么甘愿在这里当个稳定性负责人？"'},
w4:{char:'weizh',expr:'smug',speaker:'weizh',
  text:'"因为——这家公司是我创立的。"\n他靠在沙发上，双手交叉。\n"表面上，我只是一名普通员工。实际上——"\n"我是这个猪群的操纵者。"\n"拉猪负责稳定，豪猪负责活力，玉猪负责资源，头猪负责……吉祥物。"'},
w5:{char:'weizh',expr:'smug',speaker:'weizh',
  text:'"而你——新人——我需要你成为第六头猪。"\n他直视你的眼睛。\n"猪厂需要新鲜血液。而你，拥有成为猪的潜质。"\n"要不要跟我干？"'},
w5_choice:{choices:[
  {text:'"好！我愿意！"（毫不犹豫）',next:'w6',affinity:{weizh:2}},
  {text:'"我需要再想想……"',next:'w6b',affinity:{weizh:1}},
  {text:'"这听起来像某种传销组织。"',next:'w6c',affinity:{weizh:-1}}
]},

/* ===== CHARS ===== */
const Chars = {
  lazzhu:{name:'拉猪',port:portraitLazzhu},
  haozhu:{name:'豪猪',port:portraitHaozhu},
  yuzhu:{name:'玉猪',port:portraitYuzhu},
  touzh:{name:'头猪',port:portraitTouzh},
  weizh:{name:'尾猪',port:portraitWeizh},
  narration:{name:'',cls:'narration'}
};

/* ===== ENGINE ===== */
let currentSceneId = null;
function setBg(name){
  const layer=$('bg-layer');layer.innerHTML='';
  const div=document.createElement('div');
  div.className='bg-scene bg-'+name+' active';layer.appendChild(div);
}
function setChar(pos, charKey, expr){
  const el=$('char-'+pos);
  if(!charKey){el.classList.remove('active');setTimeout(()=>{if(!el.classList.contains('active'))el.innerHTML='';},500);return;}
  el.innerHTML=Chars[charKey].port(expr||'normal');
  requestAnimationFrame(()=>el.classList.add('active'));
}
function setSpeaker(charKey){
  const el=$('speaker-name');
  if(charKey==='narration'||!charKey){el.textContent='';el.className='narration';return;}
  el.textContent=Chars[charKey].name;el.className=charKey;
}
function showSceneLabel(label,sub){
  if(!label)return;
  const el=$('scene-label');
  el.innerHTML=label+(sub?'<small>'+sub+'</small>':'');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}
function typewriter(text,cb){
  State.currentText=text;State.textIndex=0;State.typing=true;
  $('dialogue-text').innerHTML='';
  clearInterval(State.typeTimer);
  let i=0;
  State.typeTimer=setInterval(()=>{
    if(i<text.length){
      const ch=text[i];
      if(ch==='\n')$('dialogue-text').innerHTML+='<br>';
      else $('dialogue-text').innerHTML+=ch;
      i++;
    } else {
      clearInterval(State.typeTimer);State.typing=false;
      $('dialogue-text').innerHTML+='<span class="cursor-blink">▼</span>';
      if(cb)cb();
    }
  },28);
}
function skipTypewriter(){
  if(State.typing){
    clearInterval(State.typeTimer);State.typing=false;
    $('dialogue-text').innerHTML=State.currentText.replace(/\n/g,'<br>')+'<span class="cursor-blink">▼</span>';
    return true;
  }
  return false;
}
function updateHUD(){
  $('bar-lazzhu').style.width=Math.min(100,State.lazzhu*10)+'%';
  $('bar-haozhu').style.width=Math.min(100,State.haozhu*10)+'%';
  $('bar-yuzhu').style.width=Math.min(100,State.yuzhu*10)+'%';
  $('bar-touzh').style.width=Math.min(100,State.touzh*10)+'%';
  $('bar-weizh').style.width=Math.min(100,State.weizh*10)+'%';
}
function showAffinityPopup(char,val){
  const el=$('affinity-popup');
  const emojis={lazzhu:'🐷',haozhu:'🦔',yuzhu:'💎',touzh:'🍚',weizh:'👑'};
  const colors={lazzhu:'#8ab4d8',haozhu:'#e88888',yuzhu:'#88d888',touzh:'#b888e8',weizh:'#e8b0e8'};
  const sign=val>0?'+':'';
  el.innerHTML=emojis[char]+' '+sign+val;
  el.style.color=val>0?colors[char]:'#666';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),1200);
}
function renderScene(id){
  const sc=Scenes[id];
  if(!sc)return;
  currentSceneId=id;State.scene=id;
  if(sc.choices){showChoices(sc.choices);return;}
  if(sc.type){showEnding(sc);return;}
  if(sc.bg)setBg(sc.bg);
  if(sc.label||sc.labelSub)showSceneLabel(sc.label,sc.labelSub);
  setChar('left',null);setChar('center',null);setChar('right',null);
  if(sc.char){const pos=sc.charPos||'center';setChar(pos,sc.char,sc.expr);}
  if(sc.char2){setChar(sc.charPos2||'right',sc.char2,sc.expr2);}
  setSpeaker(sc.speaker);
  $('dialogue-box').classList.add('show');
  setTimeout(()=>{
    let txt=(sc.text||'').replace(/{name}/g,State.player);
    typewriter(txt,()=>{if(State.autoMode)setTimeout(advance,2000);});
  },300);
}
function showChoices(choices){
  $('dialogue-box').classList.remove('show');
  const layer=$('choices-layer');layer.innerHTML='';
  choices.forEach((c,i)=>{
    const btn=document.createElement('div');
    btn.className='choice-btn';
    btn.innerHTML=c.text+(c.hint?'<br><span style="font-size:12px;color:var(--dim);margin-top:4px;display:block">'+c.hint+'</span>':'');
    btn.onclick=(e)=>{e.stopPropagation();makeChoice(c);};
    layer.appendChild(btn);
  });
  setTimeout(()=>layer.classList.add('show'),200);
}
function makeChoice(choice){
  $('choices-layer').classList.remove('show');
  setTimeout(()=>$('choices-layer').innerHTML='',300);
  if(choice.affinity){
    for(const[k,v]of Object.entries(choice.affinity)){
      State[k]+=v;showAffinityPopup(k,v);
    }
    updateHUD();
  }
  if(choice.route)State.route=choice.route;
  setTimeout(()=>renderScene(choice.next),400);
}
function getNextSceneId(id){
  const sc=Scenes[id];
  if(!sc)return null;
  if(sc.choices)return null;
  if(sc.type)return null;
  if(sc.next)return sc.next;
  const keys=Object.keys(Scenes);
  const idx=keys.indexOf(id);
  if(idx<keys.length-1)return keys[idx+1];
  return null;
}
function advance(){
  if($('choices-layer').classList.contains('show'))return;
  if($('title-screen').classList.contains('hidden')===false)return;
  if($('name-input-screen').classList.contains('hidden')===false)return;
  if($('ending-screen').classList.contains('show'))return;
  if($('fade-overlay').classList.contains('show'))return;
  if(skipTypewriter())return;
  const endings={h15:'lazzhu',h14b:'lazzhu',h14c:'lazzhu',z15:'haozhu',z13b:'haozhu',z13c:'haozhu',y15:'yuzhu',y13b:'yuzhu',y13c:'yuzhu',t15:'touzh',t14b:'touzh',t14c:'touzh',w15:'weizh'};
  if(endings[currentSceneId]){checkEnding(endings[currentSceneId]);return;}
  const next=getNextSceneId(currentSceneId);
  if(next){$('fade-overlay').classList.add('show');setTimeout(()=>{renderScene(next);$('fade-overlay').classList.remove('show');},400);}
}
function checkEnding(route){
  $('fade-overlay').classList.add('show');
  setTimeout(()=>{
    const ends={lazzhu:{g:'ending_lazzhu_good',n:'ending_lazzhu_normal',b:'ending_bad'},haozhu:{g:'ending_haozhu_good',n:'ending_haozhu_normal',b:'ending_bad'},yuzhu:{g:'ending_yuzhu_good',n:'ending_yuzhu_normal',b:'ending_bad'},touzh:{g:'ending_touzh_good',n:'ending_touzh_normal',b:'ending_bad'},weizh:{g:'ending_weizh_good',n:'ending_weizh_normal',b:'ending_bad'}};
    const map={lazzhu:State.lazzhu,haozhu:State.haozhu,yuzhu:State.yuzhu,touzh:State.touzh,weizh:State.weizh};
    const score=map[route]||0;
    const e=ends[route];
    let ending=e.b;
    if(score>=5)ending=e.g;
    else if(score>=2)ending=e.n;
    renderScene(ending);
    $('fade-overlay').classList.remove('show');
  },600);
}
function showEnding(sc){
  $('dialogue-box').classList.remove('show');
  setChar('left',null);setChar('center',null);setChar('right',null);
  if(sc.bg)setBg(sc.bg);
  if(sc.label)showSceneLabel(sc.label,sc.labelSub);
  $('hud').classList.remove('show');
  $('ending-type').textContent=sc.type;
  $('ending-title').textContent=sc.title;
  $('ending-text').innerHTML=sc.text.replace(/\n/g,'<br>');
  setTimeout(()=>{$('ending-screen').classList.add('show');},1500);
}
function saveGame(){localStorage.setItem('zhushi_save',JSON.stringify({scene:currentSceneId,player:State.player,lazzhu:State.lazzhu,haozhu:State.haozhu,yuzhu:State.yuzhu,touzh:State.touzh,weizh:State.weizh,route:State.route}));}
function loadGame(){const r=localStorage.getItem('zhushi_save');return r?JSON.parse(r):null;}
function startNewGame(){
  State.lazzhu=0;State.haozhu=0;State.yuzhu=0;State.touzh=0;State.weizh=0;State.route=null;
  $('hud').classList.add('show');updateHUD();$('title-screen').classList.add('hidden');renderScene('p1');
}
function continueGame(){
  const d=loadGame();if(!d)return;
  State.player=d.player||'新人';State.lazzhu=d.lazzhu||0;State.haozhu=d.haozhu||0;State.yuzhu=d.yuzhu||0;State.touzh=d.touzh||0;State.weizh=d.weizh||0;State.route=d.route||null;
  $('hud').classList.add('show');updateHUD();$('title-screen').classList.add('hidden');$('name-input-screen').classList.add('hidden');renderScene(d.scene);
}
/* Events */
$('game').addEventListener('click',(e)=>{
  if(e.target.closest('button')||e.target.closest('.choice-btn'))return;
  if($('choices-layer').classList.contains('show'))return;
  if($('ending-screen').classList.contains('show'))return;
  advance();
});
$('btn-start').addEventListener('click',()=>{$('title-screen').classList.add('hidden');$('name-input-screen').classList.remove('hidden');$('player-name-input').focus();});
$('btn-confirm-name').addEventListener('click',()=>{const n=$('player-name-input').value.trim()||'新人';State.player=n;$('name-input-screen').classList.add('hidden');startNewGame();});
$('player-name-input').addEventListener('keydown',(e)=>{if(e.key==='Enter')$('btn-confirm-name').click();});
$('btn-continue').addEventListener('click',continueGame);
$('btn-about').addEventListener('click',()=>{alert('《猪事可乐 - 猪厂风云》\n\n一款关于职场、友情与选择的文字冒险游戏。\n\n你作为猪事可乐科技有限公司的新员工，\n在与五位性格迥异的同事相处中做出选择，\n每一个决定都将影响你的职场命运。\n\n可攻略角色：\n🐷 拉猪 — 稳定性负责人，可靠资深\n🦔 豪猪 — 气氛组担当，暴躁但热心\n💎 玉猪 — CFO/团建管理员，精打细算\n🍚 头猪 — 神秘端碗人，受尾猪操控\n👑 尾猪 — 幕后操纵者，时尚潮流引领者\n\n点击屏幕推进剧情，选择影响好感度与结局。');});
$('btn-restart').addEventListener('click',()=>{$('ending-screen').classList.remove('show');$('title-screen').classList.remove('hidden');$('dialogue-box').classList.remove('show');setChar('left',null);setChar('center',null);setChar('right',null);State.lazzhu=0;State.haozhu=0;State.yuzhu=0;State.touzh=0;State.weizh=0;State.route=null;updateHUD();$('hud').classList.remove('show');});
$('btn-save').addEventListener('click',(e)=>{
  e.stopPropagation();
  if(currentSceneId&&Scenes[currentSceneId]&&!Scenes[currentSceneId].type&&!Scenes[currentSceneId].choices){
    saveGame();const btn=$('btn-save');const orig=btn.textContent;btn.textContent='✓';setTimeout(()=>btn.textContent=orig,1000);
  }
});
$('btn-auto').addEventListener('click',(e)=>{e.stopPropagation();State.autoMode=!State.autoMode;const btn=$('btn-auto');btn.style.color=State.autoMode?'var(--pink-l)':'';btn.style.borderColor=State.autoMode?'var(--pink)':'';});
$('btn-skip').addEventListener('click',(e)=>{
  e.stopPropagation();State.skipMode=!State.skipMode;const btn=$('btn-skip');
  btn.style.color=State.skipMode?'var(--pink-l)':'';btn.style.borderColor=State.skipMode?'var(--pink)':'';
  if(State.skipMode){skipTypewriter();const si=setInterval(()=>{if(!State.skipMode){clearInterval(si);return;}if($('choices-layer').classList.contains('show')||$('ending-screen').classList.contains('show')){clearInterval(si);State.skipMode=false;btn.style.color='';btn.style.borderColor='';return;}skipTypewriter();advance();},100);}
});
$('btn-menu').addEventListener('click',(e)=>{
  e.stopPropagation();
  if(confirm('返回标题画面？\n（进度会自动保存）')){
    saveGame();$('ending-screen').classList.remove('show');$('dialogue-box').classList.remove('show');$('choices-layer').classList.remove('show');$('choices-layer').innerHTML='';setChar('left',null);setChar('center',null);setChar('right',null);$('hud').classList.remove('show');$('title-screen').classList.remove('hidden');setBg('office');
    if(loadGame())$('btn-continue').style.display='';
  }
});
/* Auto-save */
const origRender=renderScene;
renderScene=function(id){origRender(id);if(id&&Scenes[id]&&!Scenes[id].type&&!Scenes[id].choices){setTimeout(()=>{try{saveGame();}catch(e){}},500);}};
/* Init */
setBg('office');
if(loadGame()){$('btn-continue').style.display='';}
</script>
</body>
</html>
