<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>战棋研究所 - 未卜之音</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:"Microsoft YaHei","PingFang SC",sans-serif;user-select:none}
:root{
  --bg-dark:#0a0a12;--bg-mid:#13131f;--bg-light:#1e1e30;
  --gold:#c5a059;--gold-l:#e8c878;--gold-d:#8a7030;
  --red:#a02828;--red-l:#d44848;
  --cream:#f0e6d2;--text:#e0d8c8;--dim:#7a7a8a;
  --gui:#5a8a5a;--shui:#4a7aaa;--guo:#d4a040;
}
#game{position:relative;width:100vw;height:100vh;max-width:1600px;margin:0 auto;background:var(--bg-dark);overflow:hidden;cursor:pointer}
#bg-layer{position:absolute;inset:0;z-index:1;transition:opacity .8s ease}
.bg-scene{position:absolute;inset:0;opacity:0;transition:opacity 1s ease}
.bg-scene.active{opacity:1}
.bg-exterior{background:linear-gradient(180deg,#0a0a1a 0%,#131328 50%,#1a1a35 100%)}
.bg-exterior::before{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:360px;height:420px;background:linear-gradient(180deg,#1a1a2e,#0d0d1a);border-radius:8px 8px 0 0;box-shadow:0 0 60px rgba(197,160,89,.15)}
.bg-exterior::after{content:'战棋研究所';position:absolute;bottom:280px;left:50%;transform:translateX(-50%);width:260px;height:50px;background:var(--bg-mid);border:2px solid var(--gold-d);border-radius:4px;color:var(--gold-d);font-size:14px;text-align:center;line-height:50px;letter-spacing:3px}
.bg-interior{background:linear-gradient(180deg,#15151a 0%,#1a1a22 50%,#101018 100%)}
.bg-interior::before{content:'';position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(180deg,transparent,rgba(0,0,0,.6))}
.bg-table{background:radial-gradient(ellipse at center 60%,#1a2030 0%,#10101a 50%,#0a0a10 100%)}
.bg-table::before{content:'';position:absolute;left:50%;top:55%;transform:translate(-50%,-50%);width:70%;height:50%;background:linear-gradient(180deg,#2a3a40,#1a2a30);border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.bg-painting{background:linear-gradient(180deg,#1a1a14 0%,#141810 50%,#0c1008 100%)}
.bg-studio{background:linear-gradient(180deg,#1a1520 0%,#14101a 50%,#0a0810 100%)}
.bg-night{background:linear-gradient(180deg,#050510 0%,#0a0a1a 50%,#0d0d18 100%)}
.bg-ending{background:radial-gradient(ellipse at center,#151a25 0%,#0a0a10 70%)}
#bg-layer::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.5) 100%);pointer-events:none;z-index:5}
#char-layer{position:absolute;inset:0;z-index:3;pointer-events:none}
.char-sprite{position:absolute;bottom:130px;transition:all .5s ease;opacity:0;transform:translateY(20px);filter:brightness(.5)}
.char-sprite.active{opacity:1;transform:translateY(0);filter:brightness(1)}
.char-sprite.left{left:5%}
.char-sprite.center{left:50%;transform:translateX(-50%) translateY(20px)}
.char-sprite.center.active{transform:translateX(-50%) translateY(0)}
.char-sprite.right{right:5%}
.char-sprite svg{width:320px;height:auto;filter:drop-shadow(0 4px 20px rgba(0,0,0,.6))}
#dialogue-box{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:20px 40px 24px;background:linear-gradient(180deg,rgba(10,10,18,.85) 0%,rgba(15,15,25,.95) 100%);border-top:2px solid var(--gold-d);min-height:180px;transform:translateY(100%);transition:transform .3s ease;cursor:default}
#dialogue-box.show{transform:translateY(0)}
#dialogue-box::before{content:'';position:absolute;top:-2px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
#speaker-name{display:inline-block;padding:4px 20px;margin-bottom:10px;background:linear-gradient(135deg,var(--bg-mid),var(--bg-light));border:1px solid var(--gold-d);border-radius:4px;color:var(--gold-l);font-size:16px;font-weight:bold;letter-spacing:2px}
#speaker-name.narration{border-color:var(--dim);color:var(--dim)}
#speaker-name.gui{border-color:var(--gui);color:#7ac87a}
#speaker-name.shui{border-color:var(--shui);color:#7ac0e0}
#speaker-name.guo{border-color:var(--guo);color:#e8c060}
#dialogue-text{color:var(--text);font-size:17px;line-height:1.9;letter-spacing:.5px;min-height:60px;text-shadow:0 1px 2px rgba(0,0,0,.8)}
.cursor-blink{animation:blink .6s step-end infinite;color:var(--gold-l)}
@keyframes blink{50%{opacity:0}}
#choices-layer{position:absolute;inset:0;z-index:15;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(5,5,10,.7);opacity:0;pointer-events:none;transition:opacity .3s}
#choices-layer.show{opacity:1;pointer-events:auto}
.choice-btn{min-width:420px;max-width:620px;padding:16px 28px;background:linear-gradient(135deg,rgba(20,20,30,.95),rgba(30,30,45,.95));border:1px solid var(--gold-d);border-radius:6px;color:var(--cream);font-size:15px;cursor:pointer;transition:all .25s ease;letter-spacing:1px;text-align:center;position:relative;overflow:hidden}
.choice-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);transform:scaleY(0);transition:transform .25s}
.choice-btn:hover{background:linear-gradient(135deg,rgba(40,35,20,.95),rgba(50,45,25,.95));border-color:var(--gold-l);box-shadow:0 0 20px rgba(197,160,89,.25);transform:translateX(8px)}
.choice-btn:hover::before{transform:scaleY(1)}
#title-screen{position:absolute;inset:0;z-index:50;background:radial-gradient(ellipse at center,#151a25 0%,#050510 80%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;transition:opacity .6s ease}
#title-screen.hidden{opacity:0;pointer-events:none}
.title-deco{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;background:radial-gradient(circle at 25% 35%,rgba(90,138,90,.06) 0%,transparent 40%),radial-gradient(circle at 75% 65%,rgba(74,122,170,.06) 0%,transparent 40%),radial-gradient(circle at 50% 50%,rgba(212,160,64,.04) 0%,transparent 40%)}
#title-main{font-size:44px;font-weight:bold;color:var(--gold-l);letter-spacing:6px;text-shadow:0 0 30px rgba(197,160,89,.4),0 2px 4px #000;text-align:center;line-height:1.3}
#title-sub{font-size:18px;color:var(--dim);letter-spacing:6px;border-top:1px solid var(--gold-d);border-bottom:1px solid var(--gold-d);padding:8px 40px;margin-top:4px}
.title-btns{display:flex;flex-direction:column;gap:14px;margin-top:10px}
.title-btn{min-width:240px;padding:12px 40px;background:transparent;border:1px solid var(--gold-d);color:var(--cream);font-size:16px;cursor:pointer;transition:all .25s;letter-spacing:4px;text-align:center}
.title-btn:hover{background:rgba(197,160,89,.1);border-color:var(--gold-l);color:var(--gold-l);box-shadow:0 0 15px rgba(197,160,89,.2)}
.title-btn.primary{background:linear-gradient(135deg,rgba(197,160,89,.15),rgba(160,40,40,.1));border-color:var(--gold)}
#name-input-screen{position:absolute;inset:0;z-index:48;background:rgba(5,5,10,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .4s}
#name-input-screen.hidden{opacity:0;pointer-events:none}
#name-input-screen h2{color:var(--gold-l);font-size:22px;letter-spacing:4px}
#name-input-screen p{color:var(--dim);font-size:14px}
#player-name-input{padding:12px 20px;font-size:18px;background:var(--bg-mid);border:1px solid var(--gold-d);border-radius:4px;color:var(--cream);text-align:center;letter-spacing:2px;outline:none;width:240px}
#player-name-input:focus{border-color:var(--gold-l);box-shadow:0 0 10px rgba(197,160,89,.2)}
#hud{position:absolute;top:16px;right:20px;z-index:12;display:flex;flex-direction:column;gap:6px;opacity:0;transition:opacity .3s}
#hud.show{opacity:1}
.hud-item{display:flex;align-items:center;gap:6px;background:rgba(10,10,18,.7);padding:3px 10px;border-radius:4px;border:1px solid var(--bg-light);font-size:11px}
.hud-label{min-width:28px;letter-spacing:1px}
.hud-bar{width:70px;height:5px;background:var(--bg-light);border-radius:3px;overflow:hidden}
.hud-fill{height:100%;border-radius:3px;transition:width .5s ease}
.hud-fill.gui{background:linear-gradient(90deg,#3a6a3a,var(--gui))}
.hud-fill.shui{background:linear-gradient(90deg,#3a5a7a,var(--shui))}
.hud-fill.guo{background:linear-gradient(90deg,#8a6a20,var(--guo))}
#affinity-popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;font-size:22px;font-weight:bold;opacity:0;transition:all .6s ease;pointer-events:none}
#affinity-popup.show{opacity:1;transform:translate(-50%,-60%)}
#top-bar{position:absolute;top:0;left:0;z-index:13;display:flex;gap:8px;padding:12px}
.top-btn{width:32px;height:32px;background:rgba(10,10,18,.6);border:1px solid var(--bg-light);border-radius:4px;color:var(--dim);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.top-btn:hover{color:var(--gold-l);border-color:var(--gold-d)}
#ending-screen{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;opacity:0;pointer-events:none;transition:opacity 1s ease}
#ending-screen.show{opacity:1;pointer-events:auto}
#ending-type{font-size:16px;color:var(--gold-l);letter-spacing:6px}
#ending-title{font-size:32px;font-weight:bold;color:var(--cream);letter-spacing:4px;text-shadow:0 0 20px rgba(197,160,89,.3);text-align:center;max-width:700px;line-height:1.5}
#ending-text{font-size:14px;color:var(--dim);max-width:600px;text-align:center;line-height:2;letter-spacing:1px}
.ending-btns{display:flex;gap:16px;margin-top:20px}
#fade-overlay{position:absolute;inset:0;z-index:35;background:#000;opacity:0;pointer-events:none;transition:opacity .6s ease}
#fade-overlay.show{opacity:1}
#scene-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:30;color:var(--gold-l);font-size:20px;letter-spacing:8px;opacity:0;transition:opacity .5s;pointer-events:none;text-align:center}
#scene-label.show{opacity:1}
#scene-label small{display:block;font-size:13px;color:var(--dim);letter-spacing:3px;margin-top:8px}
@media(max-width:768px){
  .char-sprite svg{width:220px}.char-sprite{bottom:150px}
  #dialogue-box{padding:16px 20px 20px;min-height:150px}#dialogue-text{font-size:15px}
  #title-main{font-size:32px}.choice-btn{min-width:300px;font-size:14px;padding:12px 20px}
  #ending-title{font-size:24px}
}
.click-advance{position:absolute;bottom:8px;right:16px;font-size:12px;color:var(--dim);animation:pulse 1.5s ease-in-out infinite;z-index:11}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}
</style>
</head>
<body>
<div id="game">
  <div id="bg-layer"></div>
  <div id="char-layer">
    <div id="char-left" class="char-sprite left"></div>
    <div id="char-center" class="char-sprite center"></div>
    <div id="char-right" class="char-sprite right"></div>
  </div>
  <div id="hud">
    <div class="hud-item"><span style="font-size:12px">🐢</span><span class="hud-label" style="color:#7ac87a">龟圣帝君</span><div class="hud-bar"><div class="hud-fill gui" id="bar-gui" style="width:0%"></div></div></div>
    <div class="hud-item"><span style="font-size:12px">🌊</span><span class="hud-label" style="color:#7ac0e0">水师父</span><div class="hud-bar"><div class="hud-fill shui" id="bar-shui" style="width:0%"></div></div></div>
    <div class="hud-item"><span style="font-size:12px">🫕</span><span class="hud-label" style="color:#e8c060">锅皇</span><div class="hud-bar"><div class="hud-fill guo" id="bar-guo" style="width:0%"></div></div></div>
  </div>
  <div id="top-bar">
    <button class="top-btn" id="btn-save" title="存档">💾</button>
    <button class="top-btn" id="btn-auto" title="自动">⚡</button>
    <button class="top-btn" id="btn-skip" title="快进">⏩</button>
    <button class="top-btn" id="btn-menu" title="菜单">☰</button>
  </div>
  <div id="affinity-popup"></div>
  <div id="scene-label"></div>
  <div id="dialogue-box">
    <span id="speaker-name"></span>
    <div id="dialogue-text"></div>
    <div class="click-advance" id="click-hint">▼ 点击继续</div>
  </div>
  <div id="choices-layer"></div>
  <div id="fade-overlay"></div>
  <div id="ending-screen">
    <div id="ending-type"></div>
    <div id="ending-title"></div>
    <div id="ending-text"></div>
    <div class="ending-btns">
      <button class="title-btn" id="btn-restart">回到标题</button>
    </div>
  </div>
  <div id="title-screen">
    <div class="title-deco"></div>
    <div id="title-main">战棋研究所</div>
    <div id="title-sub">骰 子 与 荣 耀</div>
    <div class="title-btns">
      <button class="title-btn primary" id="btn-start">开始游戏</button>
      <button class="title-btn" id="btn-continue" style="display:none">继续游戏</button>
      <button class="title-btn" id="btn-about">关于</button>
    </div>
    <div id="title-tag" style="margin-top:16px;font-size:13px;color:var(--dim);letter-spacing:3px;opacity:.6">点击屏幕推进剧情 · 选择影响你的战棋之路</div>
  </div>
  <div id="name-input-screen" class="hidden">
    <h2>请输入你的名字</h2>
    <p>你是战棋研究所的新人</p>
    <input type="text" id="player-name-input" maxlength="6" placeholder="新人" value="新人">
    <button class="title-btn primary" id="btn-confirm-name">确认</button>
  </div>
</div>
<script>
/* ===== PORTRAITS ===== */
function portraitGui(expr){
  const smile=expr==='smile';
  const serious=expr==='serious';
  const mouth = smile
    ?'<path d="M146,244 Q160,254 174,244" stroke="#a05050" stroke-width="2.5" fill="none" stroke-linecap="round"/>'
    :serious
    ?'<path d="M148,250 L172,250" stroke="#a05050" stroke-width="2.5" fill="none" stroke-linecap="round"/>'
    :'<path d="M150,248 Q160,250 170,248" stroke="#a05050" stroke-width="2" fill="none" stroke-linecap="round"/>';
  const eyes = smile
    ?'<path d="M125,196 Q135,189 145,196 Q135,200 125,196" fill="#2a3a2a"/><path d="M175,196 Q185,189 195,196 Q185,200 175,196" fill="#2a3a2a"/><circle cx="135" cy="195" r="3" fill="#4a8a4a"/><circle cx="185" cy="195" r="3" fill="#4a8a4a"/><circle cx="137" cy="193" r="1.5" fill="#fff"/><circle cx="187" cy="193" r="1.5" fill="#fff"/>'
    :'<ellipse cx="135" cy="196" rx="9" ry="6" fill="#fff"/><ellipse cx="185" cy="196" rx="9" ry="6" fill="#fff"/><circle cx="135" cy="197" r="4.5" fill="#3a6a3a"/><circle cx="185" cy="197" r="4.5" fill="#3a6a3a"/><circle cx="137" cy="195" r="1.8" fill="#fff"/><circle cx="187" cy="195" r="1.8" fill="#fff"/>';
  const brow = serious
    ?'<path d="M118,172 L150,178" stroke="#1a1a2e" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M170,178 L202,172" stroke="#1a1a2e" stroke-width="3" fill="none" stroke-linecap="round"/>'
    :'<path d="M120,174 Q135,169 150,174" stroke="#1a1a2e" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M170,174 Q185,169 200,174" stroke="#1a1a2e" stroke-width="3" fill="none" stroke-linecap="round"/>';
  return `<svg viewBox="0 0 320 480" xmlns="http://www.w3.org/2000/svg">
<defs><linearGradient id="gs" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e8d0b8"/><stop offset="1" stop-color="#d4b898"/></linearGradient>
<linearGradient id="gh" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1a2a1a"/><stop offset="1" stop-color="#2a3a2a"/></linearGradient>
<linearGradient id="gc" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2a3a2a"/><stop offset="1" stop-color="#1a2a1a"/></linearGradient></defs>
<!-- Coat -->
<path d="M50,480 L50,375 Q50,330 100,312 Q135,300 160,298 Q185,300 220,312 Q270,330 270,375 L270,480 Z" fill="url(#gc)"/>
<!-- Collar -->
<path d="M100,312 Q135,302 160,300 Q185,302 220,312 L210,335 Q185,328 160,325 Q135,328 110,335 Z" fill="#1a2a1a"/>
<!-- Red headphones around neck -->
<g transform="translate(0,0)">
<path d="M90,300 Q75,280 78,260 Q82,240 95,235" stroke="#c42828" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M230,300 Q245,280 242,260 Q238,240 225,235" stroke="#c42828" stroke-width="6" fill="none" stroke-linecap="round"/>
<ellipse cx="78" cy="258" rx="10" ry="8" fill="#c42828"/>
<ellipse cx="242" cy="258" rx="10" ry="8" fill="#c42828"/>
<path d="M82,260 Q160,310 238,260" stroke="#c42828" stroke-width="4" fill="none"/>
</g>
<!-- Neck -->
<path d="M140,268 L140,302 Q160,308 180,302 L180,268 Z" fill="url(#gs)"/>
<!-- Hair back -->
<path d="M90,200 Q88,108 160,90 Q232,108 230,200 L228,270 L210,255 Q205,210 160,200 Q115,210 110,255 L92,270 Z" fill="url(#gh)"/>
<!-- Face -->
<path d="M108,165 Q108,108 160,96 Q212,108 212,165 L212,220 Q212,262 160,267 Q108,262 108,220 Z" fill="url(#gs)"/>
<!-- Ears -->
<ellipse cx="106" cy="190" rx="7" ry="13" fill="url(#gs)"/>
<ellipse cx="214" cy="190" rx="7" ry="13" fill="url(#gs)"/>
<!-- Hair front -->
<path d="M95,170 Q92,100 160,86 Q228,100 225,170 L220,148 Q210,122 188,118 Q180,138 168,125 Q160,142 148,125 Q140,142 128,125 Q108,130 100,148 Z" fill="url(#gh)"/>
<path d="M100,145 Q105,120 120,115" stroke="#2a4a2a" stroke-width="2" fill="none" opacity=".6"/>
<path d="M220,145 Q215,120 200,115" stroke="#2a4a2a" stroke-width="2" fill="none" opacity=".6"/>
${brow}
${eyes}
<!-- Nose -->
<path d="M158,212 Q155,224 159,228 Q163,224 162,228" stroke="#c4a070" stroke-width="1.5" fill="none" stroke-linecap="round"/>
${mouth}
<!-- Collar pin - Sisters of Battle emblem -->
<circle cx="160" cy="325" r="4" fill="#c5a059"/>
<path d="M157,325 L163,325 M160,322 L160,328" stroke="#c5a059" stroke-width="1.5"/>
<!-- Jaw shadow -->
<path d="M120,240 Q160,270 200,240 L200,260 Q160,270 120,260 Z" fill="#cc9a78" opacity=".15"/>
</svg>`;
}

function portraitShui(expr){
  const happy=expr==='happy';
  const serious=expr==='serious';
  const mouth = happy
    ?'<path d="M142,246 Q160,262 178,246 Q170,255 160,256 Q150,255 142,246" fill="#c44848" opacity=".5"/><path d="M142,246 Q160,258 178,246" stroke="#a05050" stroke-width="1.5" fill="none"/>'
    :'<path d="M148,248 Q160,252 172,248" stroke="#a05050" stroke-width="2.5" fill="none" stroke-linecap="round"/>';
  const eyes = happy
    ?'<path d="M122,198 Q135,190 148,198" stroke="#3a4a5a" stroke-width="3" fill="none" stroke-linecap="round"/><path d="M172,198 Q185,190 198,198" stroke="#3a4a5a" stroke-width="3" fill="none" stroke-linecap="round"/><circle cx="135" cy="200" r="2.5" fill="#4a7aaa"/><circle cx="185" cy="200" r="2.5" fill="#4a7aaa"/>'
    :'<ellipse cx="135" cy="198" rx="9" ry="7" fill="#fff"/><ellipse cx="185" cy="198" rx="9" ry="7" fill="#fff"/><circle cx="135" cy="199" r="5" fill="#4a7aaa"/><circle cx="185" cy="199" r="5" fill="#4a7aaa"/><circle cx="136" cy="197" r="2" fill="#fff"/><circle cx="186" cy="197" r="2" fill="#fff"/>';
  return `<svg viewBox="0 0 320 480" xmlns="http://www.w3.org/2000/svg">
<defs><linearGradient id="ss" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f0d8c0"/><stop offset="1" stop-color="#ddc0a8"/></linearGradient>
<linearGradient id="sh" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3a4a5a"/><stop offset="1" stop-color="#2a3a4a"/></linearGradient>
<linearGradient id="sc" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4a6a8a"/><stop offset="1" stop-color="#2a4a6a"/></linearGradient></defs>
<!-- Coat -->
<path d="M50,480 L50,380 Q50,330 95,312 Q130,300 160,298 Q190,300 225,312 Q270,330 270,380 L270,480 Z" fill="url(#sc)"/>
<!-- Collar -->
<path d="M95,312 Q130,302 160,300 Q190,302 225,312 L215,335 Q185,328 160,325 Q135,328 110,335 Z" fill="#3a5a7a"/>
<!-- Neck -->
<path d="M142,268 L142,302 Q160,308 178,302 L178,268 Z" fill="url(#ss)"/>

/* ===== SHUI ROUTE ===== */
s1:{bg:'table',label:'水师父线',labelSub:'教学相长',
  text:'你走向对战区。水师父正和另一个玩家打血碗——\n场上狼人正抱着球冲向达阵区，场面一度十分混乱。\n"好球！！"\n水师父一拍桌子，骰子跳了起来。'},
s2:{char:'shui',expr:'happy',speaker:'shui',
  text:'"哟！你来了！"\n他结束那局后，连比分都没看就朝你走来。\n"等我三分钟！我收一下模型——然后咱俩开一局！"\n"你想打40k还是血碗？"\n"算了你不用回答——两个都打一遍吧！"'},
s3:{speaker:'narration',
  text:'水师父的热情让人无法拒绝。\n三分钟后，桌上摆好了两支新手友好军队。\n"40k和血碗其实很多底层逻辑是通的——"\n"移动、进攻、防守、骰运。学会了40k，血碗就是橄榄球版的40k。"'},
s4:{speaker:'narration',
  text:'水师父的教学方式和龟圣帝君截然不同。\n龟圣帝君是诗——安静而深邃。\n水师父是摇滚——热烈而直接。\n他会为了你掷出一个六点而欢呼，也会因为你战术失误而拍着桌子大笑。\n"不不不——你这个位置放错了！你看啊——"'},
s5:{char:'shui',expr:'happy',speaker:'shui',
  text:'"但是没关系！犯错才是学习最快的方式！"\n他重新摆好你的模型。\n"来，重新来——这次你换一个思路。试试侧翼包抄。"'},
s5_choice:{choices:[
  {text:'"好！我试试！"（干劲满满）',next:'s6',affinity:{shui:2}},
  {text:'"你教得真好……比我之前自己看规则书强多了。"',next:'s6b',affinity:{shui:1}},
  {text:'"我有点累了，想歇会儿……"',next:'s6c',affinity:{shui:-1}}
]},
s6:{char:'shui',expr:'happy',speaker:'shui',next:'s7',
  text:'"对对对！就是这个气势！"\n水师父重重拍了拍你的肩膀。\n"战棋最重要的不是技术——是想赢的心！"\n"技术可以练——心气不能丢！"'},
s6b:{char:'shui',expr:'happy',speaker:'shui',next:'s7',
  text:'"哈哈，你这么一说我都不好意思了。"\n他挠了挠头，眼镜片后面的眼睛笑成了两条缝。\n"其实我就是喜欢带新人——看到你们从不会到会，比我自己赢棋还开心。"'},
s6c:{char:'shui',expr:'normal',speaker:'shui',next:'s7',
  text:'"行！那休息一会儿！"\n他立刻放下了骰子。\n"我去给你倒杯水——对了你喝什么？茶还是咖啡？"\n"我们店里的咖啡可是龟圣帝君亲自挑的豆子。"'},
s7:{speaker:'narration',
  text:'你们打了三局。\n第一局你被血虐。\n第二局你勉强撑到了第五回合。\n第三局——你在水师父放了一片海的情况下，赢了一次。'},
s8:{char:'shui',expr:'happy',speaker:'shui',
  text:'"漂亮！漂亮！"\n他比你还激动，差点把桌上的地形撞倒。\n"看到没——你是有天赋的！"\n"第一次来能打成这样，我当年可是连跪了两个月才赢第一局！"'},
s9:{char:'shui',expr:'normal',speaker:'shui',
  text:'"不过说真的——"\n他难得地正经起来。\n"你知道为什么我喜欢带新人吗？"\n他靠在椅背上，看着天花板。\n"因为每个人第一次玩战棋的时候，眼睛里都有光。"\n"那种『原来还可以这样』的眼神——比任何对战都精彩。"'},
s10:{char:'shui',expr:'happy',speaker:'shui',
  text:'"而我希望——你眼里的光，能一直亮下去。"\n他举起可乐罐——他喝的是可乐，不是茶。\n"敬骰子！敬战棋！"\n你笑着跟他碰了碰罐。'},
s11:{speaker:'narration',
  text:'不知不觉到了傍晚。\n其他客人都走了，水师父还在跟你复盘今天的对战。\n他身上有一种让人放松的魔力——\n跟他在一起，输赢都不重要。\n重要的是——你享受了战棋的快乐。'},
s12:{bg:'night',char:'shui',expr:'happy',speaker:'shui',
  text:'"下周还来吗？"\n他在门口问你。\n"我研究了一套新的血碗战术——星际战队式进攻阵型！"\n"你可以当我的陪练！"\n他说"陪练"的时候眼睛亮晶晶的——\n其实是想教你新战术，却不好意思直说。'},
s12_choice:{choices:[
  {text:'"来！我已经开始期待了！"',next:'s13',affinity:{shui:2}},
  {text:'"如果周末不加班的话就来。"',next:'s13b',affinity:{shui:1}},
  {text:'"下次我想试试别的阵营……"',next:'s13c',affinity:{shui:-1}}
]},
s13:{speaker:'narration',
  text:'水师父咧嘴笑了。\n"那就说定了！"\n他转身走回店里，背影消失在暖黄色的灯光中。\n你站在门口，心想——\n能遇到这么好的师父，是你战棋之路上最大的幸运。\n→ 前往结局判定'},
s13b:{speaker:'narration',
  text:'"行！有空就来！"\n他挥了挥手。\n"我反正每天都在——除了周二，周二我去进货。"\n你点了点头。\n水师父这样的人——他会在原地一直等你。\n→ 前往结局判定'},
s13c:{speaker:'narration',
  text:'"可以啊！想试哪个阵营？我帮你准备军队！"\n他的热情依然不减。\n但你知道——你婉拒的不仅仅是一场约局。\n→ 前往结局判定'},

/* ===== GUO ROUTE ===== */
k1:{bg:'interior',label:'锅皇线',labelSub:'财力展示',
  text:'你走向展示柜。锅皇正小心翼翼地擦拭一个玻璃展示盒——里面是一台巨大的战犬级泰坦。\n他抬头看到你，立刻露出了"终于有人来欣赏我的宝贝了"的表情。'},
k2:{char:'guo',expr:'smug',speaker:'guo',
  text:'"新人！来得正好！"\n他拍了拍身边的展示柜。\n"来来来，我带你看看我的收藏。"\n"你知道这台泰坦我花了多少钱拍到的吗？"\n他说了一个让你倒吸一口凉气的数字。'},
k3:{speaker:'narration',
  text:'锅皇的收藏品陈列在旋转楼梯下方的玻璃柜中。\n每一层都打着精准的射灯，每一台模型都配着烫金铭牌——\n"战犬级泰坦 · 限量涂装版 · No.087/500"\n"圣血天使战团长 · 赛事纪念版"\n"荷鲁斯之乱 · 全系列角色套装（未拆封）"'},
k4:{char:'guo',expr:'smug',speaker:'guo',
  text:'"你知道收藏的秘诀是什么吗？"\n他神秘地压低声音。\n"不是有钱——是眼光。"\n"要在它还没涨起来的时候入手。"\n"比如这台——我入手的时候才这个数——"\n他又说了一个数字，这次你没有倒吸凉气——\n因为你已经完全不知道他在说什么了。'},
k4_choice:{choices:[
  {text:'"哇……这些模型真的好精致！"（真诚赞美）',next:'k5',affinity:{guo:2}},
  {text:'"这个投资回报率大概是多少？"（假装懂行）',next:'k5b',affinity:{guo:1}},
  {text:'"……这一柜子得多少钱啊。"',next:'k5c',affinity:{guo:-1}}
]},
k5:{char:'guo',expr:'smug',speaker:'guo',next:'k6',
  text:'"对吧！我就知道你有品位！"\n锅皇眼睛一亮，像是找到了知音。\n"你看这个涂装——阴影过渡、高光层次——这可是一流涂装师的杰作！"'},
k5b:{char:'guo',expr:'smug',speaker:'guo',next:'k6',
  text:'"哦？你也懂投资？"\n他推了推并不存在的眼镜。\n"那我跟你讲讲——战棋模型的二级市场走势……"\n接下来半小时，你后悔了自己问出的这个问题。'},
k5c:{char:'guo',expr:'normal',speaker:'guo',next:'k6',
  text:'"呃……不多不多。"\n他难得地有点不好意思。\n"也就是一辆车的钱……好吧，几辆车。"\n"但是——爱好嘛！人活着不就是为了爱好吗！"'},
k6:{speaker:'narration',
  text:'锅皇带着你参观了整个收藏柜——从一楼到二楼。\n他的热情是真挚的。虽然他总是在"炫"，但他炫的方式有一种天真的快乐——\n像一个孩子跟朋友展示自己收集的奥特曼卡片。'},
k7:{char:'guo',expr:'happy',speaker:'guo',
  text:'"你知道我最喜欢的是什么吗？"\n他走到最里面的一个柜子前。\n里面陈列着一台——\n看起来极其粗糙的、涂装歪歪扭扭的星际战士兰德袭击者。\n"这是我十年前涂的第一台模型。"'},
k8:{char:'guo',expr:'normal',speaker:'guo',
  text:'"那时候我什么都不懂——拿毛笔涂的。你看这个边缘——"\n他指着那台坦克的履带。\n"颜料都流到外面了。"\n"但是我一直留着它。"\n"因为它提醒我——每个人都是从新手开始的。"'},
k8_choice:{choices:[
  {text:'"这台模型的回忆比那些限量版更珍贵吧？"',next:'k9',affinity:{guo:2}},
  {text:'"你进步好大！跟现在比简直判若两人！"',next:'k9b',affinity:{guo:1}},
  {text:'"确实涂得挺丑的……"',next:'k9c',affinity:{guo:-1}}
]},
k9:{char:'guo',expr:'smile',speaker:'guo',next:'k10',
  text:'锅皇愣了一下，然后笑了——\n是那种发自内心的、不带任何炫耀的笑容。\n"你说得对。"\n"这台破坦克——比我一整柜限量版都有意义。"'},
k9b:{char:'guo',expr:'happy',speaker:'guo',next:'k10',
  text:'"哈哈哈——那当然！我可是烧了不少钱来进步的！"\n他看起来被夸得很开心。\n"你要是想学涂装，我可以教你几招——"'},
k9c:{char:'guo',expr:'normal',speaker:'guo',next:'k10',
  text:'"喂！……好吧确实是丑。"\n他故作生气地瞪了你一眼，但嘴角带着笑。\n"但是——这是我自己的第一台。丑也是我的。"'},
k10:{char:'guo',expr:'smile',speaker:'guo',
  text:'"其实我天天炫这些收藏——"\n他环顾了一圈自己的展示柜。\n"不是为了让别人羡慕我。"\n"是想让人知道——战棋这个爱好，值得投入。"\n"不管是时间、金钱——还是热爱。"'},
k11:{speaker:'narration',
  text:'你看着锅皇认真擦拭那台歪歪扭扭的兰德袭击者。\n忽然觉得——他其实不像表面看起来那么浮夸。\n他只是在用他自己的方式，守护着对战棋的热爱。'},
k12:{bg:'night',text:'临走前，锅皇叫住了你。'},
k13:{char:'guo',expr:'happy',speaker:'guo',
  text:'"对了——这个送你。"\n他从柜子里拿出一个小盒。\n里面是一套崭新的涂装笔。\n"初学者用这个牌子最好——我当年也是用这个起步的。"\n"等你的第一台模型涂好了——拿给我看。"'},
k13_choice:{choices:[
  {text:'"谢谢你！我一定认真涂！"',next:'k14',affinity:{guo:2}},
  {text:'"这太贵重了……我不能收。"',next:'k14b',affinity:{guo:1}},
  {text:'"好……我试试看。"（没什么信心）',next:'k14c',affinity:{guo:-1}}
]},
k14:{speaker:'narration',
  text:'你握着那套画笔，觉得沉甸甸的。\n锅皇拍了拍你的肩膀。\n"记住——每一台你亲手涂的模型，都是你战棋之路的勋章。"\n"不管你涂得多丑——那都是你的。"\n他朝你眨了眨眼睛。\n\n走出研究所时，你低头看了看那套画笔。\n——你已经开始构思自己的第一台模型了。\n→ 前往结局判定'},
k14b:{speaker:'narration',
  text:'"拿着吧。"\n他硬把盒子塞到你手里。\n"就当是——欢迎加入战棋研究所的见面礼。"\n"等你有自己的作品了，再还不迟。"\n你收下了盒子。\n——锅皇给的见面礼，谁敢不收呢。\n→ 前往结局判定'},
k14c:{speaker:'narration',
  text:'"别怕！涂坏了也没关系！"\n他用力拍了拍你的背。\n"你看我那台兰德袭击者——涂成那样我都没扔！"\n"只要是你亲手涂的，就值得珍惜！"\n你点了点头。\n→ 前往结局判定'},

/* ===== ENDINGS ===== */
ending_gui_good:{bg:'ending',label:'结局',labelSub:'龟圣帝君线·Good Ending',type:'GOOD ENDING',title:'圣焰传承',
  text:'几个月后，你的修女小队已经小有名气。\n在研究所举办的内部赛中，你打进了四强。\n龟圣帝君在半决赛中输给了你——准确的说是他放了一片海，但你确实变强了。\n\n赛后他站在展示柜前，把那副红色耳机取下来，挂在了你的脖子上。\n"你不再需要新手护身符了。"他说。\n"现在——你是战棋研究所的正式成员了。"\n那副耳机还残留着他的体温。\n\n在战棋的世界里，最珍贵的传承不是战术——\n而是有人愿意把火炬递到你手上。\n而你，接住了。'},
ending_gui_normal:{bg:'ending',label:'结局',labelSub:'龟圣帝君线·Normal Ending',type:'NORMAL ENDING',title:'稳步前行',
  text:'你成了研究所的常客。\n每次来都会找龟圣帝君打一局修女内战。\n你的胜率从0%慢慢升到了偶尔能赢一次。\n他依然是那副温和从容的样子，但你知道——\n他在为你感到高兴。\n\n"继续加油。"他推了推耳机。\n"你这周比上周强多了。"\n——对于龟圣帝君来说，这已经是很高的评价了。'},
ending_shui_good:{bg:'ending',label:'结局',labelSub:'水师父线·Good Ending',type:'GOOD ENDING',title:'薪火相传',
  text:'水师父说你是他带过最有天赋的新人之一。\n你不仅学会了40k的基础战术，还在血碗里打出了自己的风格。\n有一天，你正在教另一个新人怎么设置移动阶段——\n水师父在旁边看着，忽然笑了。\n\n"你知道你刚才的样子像谁吗？"\n"像我。"\n他走过来，拍了拍那个新人的肩膀。\n"这位是我的徒弟——现在是你的师兄了。"\n\n那一刻你才明白——\n水师父教给你的不只是战棋。\n是「学会了，就要教给下一个人」的传承。'},
ending_shui_normal:{bg:'ending',label:'结局',labelSub:'水师父线·Normal Ending',type:'NORMAL ENDING',title:'快乐玩家',
  text:'你成了水师父的固定棋友。\n每周三和周六，你们都会打上几局——\n40k、血碗、甚至偶尔尝试一些冷门规则。\n输赢不重要，重要的是每次打完都会一起去便利店买可乐。\n\n"下周我研究一个新战术！"他每次告别时都会这么说。\n你笑着点头。\n——战棋的快乐，就是这么简单。'},
ending_guo_good:{bg:'ending',label:'结局',labelSub:'锅皇线·Good Ending',type:'GOOD ENDING',title:'收藏之心',
  text:'你完成了自己的第一台涂装模型——\n一台涂装歪歪扭扭的星际战士兰德袭击者。\n和锅皇那台并排放在展示柜的最底层。\n\n锅皇看着你那台模型，沉默了很久。\n然后他把自己的那台拿了出来，放在了你旁边。\n"以后——这两台就是镇店之宝了。"\n他难得没提价格。\n\n你的模型旁边多了一张烫金铭牌——\n「新人之光 · 战棋研究所的新成员作品」\n下面还有一行小字：\n"每一个大师，都从一个蹩脚的第一步开始。"'},
ending_guo_normal:{bg:'ending',label:'结局',labelSub:'锅皇线·Normal Ending',type:'NORMAL ENDING',title:'展示柜邻居',
  text:'你的第一台模型被锅皇放进了他的展示柜——\n虽然是最底层最角落的位置。\n"等你涂好了下一台，我给你挪到中间去。"\n他敲了敲玻璃柜。\n\n你知道他只是嘴上这么说。\n但你决定——下一台一定要涂好一点。\n因为锅皇的展示柜，是你入坑的起点。'},
ending_bad:{bg:'ending',label:'结局',labelSub:'Bad Ending',type:'BAD ENDING',title:'入门即止',
  text:'你渐渐不再去战棋研究所了。\n不是因为不喜欢战棋——只是生活太忙了。\n加班、社交、各种乱七八糟的事。\n\n偶尔路过那扇深色木门，能透过落地窗看到里面暖黄色的灯光。\n展示柜里的模型还在那里。\n龟圣帝君大概还在柜台后画战术图。\n水师父大概还在带新人打教学局。\n锅皇大概又在擦他的泰坦了。\n\n但你没有推开门。\n\n有些爱好，错过了最好的时机——\n就再也捡不起来了。'}
};

/* ===== CHARS ===== */
const Chars = {gui:{name:'龟圣帝君',port:portraitGui},shui:{name:'水师父',port:portraitShui},guo:{name:'锅皇',port:portraitGuo},narration:{name:'',cls:'narration'}};

/* ===== ENGINE ===== */
let currentSceneId=null;
function setBg(name){const l=$('bg-layer');l.innerHTML='';const d=document.createElement('div');d.className='bg-scene bg-'+name+' active';l.appendChild(d);}
function setChar(p,c,e){const el=$('char-'+p);if(!c){el.classList.remove('active');setTimeout(()=>{if(!el.classList.contains('active'))el.innerHTML='';},500);return;}el.innerHTML=Chars[c].port(e||'normal');requestAnimationFrame(()=>el.classList.add('active'));}
function setSpeaker(c){const el=$('speaker-name');if(c==='narration'||!c){el.textContent='';el.className='narration';return;}el.textContent=Chars[c].name;el.className=c;}
function showSceneLabel(l,s){if(!l)return;const el=$('scene-label');el.innerHTML=l+(s?'<small>'+s+'</small>':'');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}
function typewriter(t,cb){State.currentText=t;State.textIndex=0;State.typing=true;$('dialogue-text').innerHTML='';clearInterval(State.typeTimer);let i=0;State.typeTimer=setInterval(()=>{if(i<t.length){const ch=t[i];if(ch==='\n')$('dialogue-text').innerHTML+='<br>';else $('dialogue-text').innerHTML+=ch;i++;}else{clearInterval(State.typeTimer);State.typing=false;$('dialogue-text').innerHTML+='<span class="cursor-blink">▼</span>';if(cb)cb();}},28);}
function skipTypewriter(){if(State.typing){clearInterval(State.typeTimer);State.typing=false;$('dialogue-text').innerHTML=State.currentText.replace(/\n/g,'<br>')+'<span class="cursor-blink">▼</span>';return true;}return false;}
function updateHUD(){$('bar-gui').style.width=Math.min(100,State.gui*10)+'%';$('bar-shui').style.width=Math.min(100,State.shui*10)+'%';$('bar-guo').style.width=Math.min(100,State.guo*10)+'%';}
function showAffinityPopup(c,v){const el=$('affinity-popup');const e={'gui':'🐢','shui':'🌊','guo':'🫕'};const cl={'gui':'#7ac87a','shui':'#7ac0e0','guo':'#e8c060'};el.innerHTML=e[c]+' '+(v>0?'+':'')+v;el.style.color=v>0?cl[c]:'#666';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1200);}
function renderScene(id){
  const sc=Scenes[id];if(!sc)return;currentSceneId=id;State.scene=id;
  if(sc.choices){showChoices(sc.choices);return;}
  if(sc.type){showEnding(sc);return;}
  if(sc.bg)setBg(sc.bg);
  if(sc.label||sc.labelSub)showSceneLabel(sc.label,sc.labelSub);
  setChar('left',null);setChar('center',null);setChar('right',null);
  if(sc.char){const p=sc.charPos||'center';setChar(p,sc.char,sc.expr);}
  if(sc.char2){setChar(sc.charPos2||'right',sc.char2,sc.expr2);}
  setSpeaker(sc.speaker);$('dialogue-box').classList.add('show');
  setTimeout(()=>{let t=(sc.text||'').replace(/{name}/g,State.player);typewriter(t,()=>{if(State.autoMode)setTimeout(advance,2000);});},300);
}
function showChoices(choices){$('dialogue-box').classList.remove('show');const l=$('choices-layer');l.innerHTML='';choices.forEach((c,i)=>{const b=document.createElement('div');b.className='choice-btn';b.innerHTML=c.text+(c.hint?'<br><span style="font-size:12px;color:var(--dim);margin-top:4px;display:block">'+c.hint+'</span>':'');b.onclick=(e)=>{e.stopPropagation();makeChoice(c);};l.appendChild(b);});setTimeout(()=>l.classList.add('show'),200);}
function makeChoice(c){$('choices-layer').classList.remove('show');setTimeout(()=>$('choices-layer').innerHTML='',300);if(c.affinity){for(const[k,v]of Object.entries(c.affinity)){State[k]+=v;showAffinityPopup(k,v);}updateHUD();}if(c.route)State.route=c.route;setTimeout(()=>renderScene(c.next),400);}
function getNextSceneId(id){const s=Scenes[id];if(!s)return null;if(s.choices)return null;if(s.type)return null;if(s.next)return s.next;const k=Object.keys(Scenes);const i=k.indexOf(id);if(i<k.length-1)return k[i+1];return null;}
function advance(){
  if($('choices-layer').classList.contains('show'))return;
  if($('title-screen').classList.contains('hidden')===false)return;
  if($('name-input-screen').classList.contains('hidden')===false)return;
  if($('ending-screen').classList.contains('show'))return;
  if($('fade-overlay').classList.contains('show'))return;
  if(skipTypewriter())return;
  const ends={g15:'gui',g14b:'gui',g14c:'gui',s13:'shui',s13b:'shui',s13c:'shui',k14:'guo',k14b:'guo',k14c:'guo'};
  if(ends[currentSceneId]){checkEnding(ends[currentSceneId]);return;}
  const n=getNextSceneId(currentSceneId);
  if(n){$('fade-overlay').classList.add('show');setTimeout(()=>{renderScene(n);$('fade-overlay').classList.remove('show');},400);}
}
function checkEnding(r){
  $('fade-overlay').classList.add('show');
  setTimeout(()=>{const e={gui:{g:'ending_gui_good',n:'ending_gui_normal',b:'ending_bad'},shui:{g:'ending_shui_good',n:'ending_shui_normal',b:'ending_bad'},guo:{g:'ending_guo_good',n:'ending_guo_normal',b:'ending_bad'}};const m={gui:State.gui,shui:State.shui,guo:State.guo};const v=m[r]||0;const o=e[r];let end=v>=5?o.g:v>=2?o.n:o.b;renderScene(end);$('fade-overlay').classList.remove('show');},600);
}
function showEnding(s){$('dialogue-box').classList.remove('show');setChar('left',null);setChar('center',null);setChar('right',null);if(s.bg)setBg(s.bg);if(s.label)showSceneLabel(s.label,s.labelSub);$('hud').classList.remove('show');$('ending-type').textContent=s.type;$('ending-title').textContent=s.title;$('ending-text').innerHTML=s.text.replace(/\n/g,'<br>');setTimeout(()=>{$('ending-screen').classList.add('show');},1500);}
function saveGame(){localStorage.setItem('wargame_save',JSON.stringify({scene:currentSceneId,player:State.player,gui:State.gui,shui:State.shui,guo:State.guo,route:State.route}));}
function loadGame(){const r=localStorage.getItem('wargame_save');return r?JSON.parse(r):null;}
function startNewGame(){State.gui=0;State.shui=0;State.guo=0;State.route=null;$('hud').classList.add('show');updateHUD();$('title-screen').classList.add('hidden');renderScene('p1');}
function continueGame(){const d=loadGame();if(!d)return;State.player=d.player||'新人';State.gui=d.gui||0;State.shui=d.shui||0;State.guo=d.guo||0;State.route=d.route||null;$('hud').classList.add('show');updateHUD();$('title-screen').classList.add('hidden');$('name-input-screen').classList.add('hidden');renderScene(d.scene);}
$('game').addEventListener('click',(e)=>{if(e.target.closest('button')||e.target.closest('.choice-btn'))return;if($('choices-layer').classList.contains('show'))return;if($('ending-screen').classList.contains('show'))return;advance();});
$('btn-start').addEventListener('click',()=>{$('title-screen').classList.add('hidden');$('name-input-screen').classList.remove('hidden');$('player-name-input').focus();});
$('btn-confirm-name').addEventListener('click',()=>{const n=$('player-name-input').value.trim()||'新人';State.player=n;$('name-input-screen').classList.add('hidden');startNewGame();});
$('player-name-input').addEventListener('keydown',(e)=>{if(e.key==='Enter')$('btn-confirm-name').click();});
$('btn-continue').addEventListener('click',continueGame);
$('btn-about').addEventListener('click',()=>{alert('《战棋研究所 - 骰子与荣耀》\n\n一款关于战棋、传承与热爱的文字冒险游戏。\n\n你作为新加入战棋研究所的玩家，\n在与三位核心人物的互动中做出选择，\n每一个决定都将影响你的战棋之路。\n\n可攻略角色：\n🐢 龟圣帝君 — 店长，修女顶尖高手，沉稳友善\n🌊 水师父 — 老玩家，40k/血碗教学达人\n🫕 锅皇 — 收藏家，财力展示专业户\n\n点击推进剧情 · 选择决定结局');});
$('btn-restart').addEventListener('click',()=>{$('ending-screen').classList.remove('show');$('title-screen').classList.remove('hidden');$('dialogue-box').classList.remove('show');setChar('left',null);setChar('center',null);setChar('right',null);State.gui=0;State.shui=0;State.guo=0;State.route=null;updateHUD();$('hud').classList.remove('show');});
$('btn-save').addEventListener('click',(e)=>{e.stopPropagation();if(currentSceneId&&Scenes[currentSceneId]&&!Scenes[currentSceneId].type&&!Scenes[currentSceneId].choices){saveGame();const b=$('btn-save');const o=b.textContent;b.textContent='✓';setTimeout(()=>b.textContent=o,1000);}});
$('btn-auto').addEventListener('click',(e)=>{e.stopPropagation();State.autoMode=!State.autoMode;const b=$('btn-auto');b.style.color=State.autoMode?'var(--gold-l)':'';b.style.borderColor=State.autoMode?'var(--gold-d)':'';});
$('btn-skip').addEventListener('click',(e)=>{e.stopPropagation();State.skipMode=!State.skipMode;const b=$('btn-skip');b.style.color=State.skipMode?'var(--gold-l)':'';b.style.borderColor=State.skipMode?'var(--gold-d)':'';if(State.skipMode){skipTypewriter();const si=setInterval(()=>{if(!State.skipMode){clearInterval(si);return;}if($('choices-layer').classList.contains('show')||$('ending-screen').classList.contains('show')){clearInterval(si);State.skipMode=false;b.style.color='';b.style.borderColor='';return;}skipTypewriter();advance();},100);}});
$('btn-menu').addEventListener('click',(e)=>{e.stopPropagation();if(confirm('返回标题画面？（进度会自动保存）')){saveGame();$('ending-screen').classList.remove('show');$('dialogue-box').classList.remove('show');$('choices-layer').classList.remove('show');$('choices-layer').innerHTML='';setChar('left',null);setChar('center',null);setChar('right',null);$('hud').classList.remove('show');$('title-screen').classList.remove('hidden');setBg('exterior');if(loadGame())$('btn-continue').style.display='';}});
const oR=renderScene;renderScene=function(id){oR(id);if(id&&Scenes[id]&&!Scenes[id].type&&!Scenes[id].choices){setTimeout(()=>{try{saveGame();}catch(e){}},500);}};
setBg('exterior');if(loadGame()){$('btn-continue').style.display='';}
</script>
</body>
</html>
